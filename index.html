<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 ピクミンガーデン 🌱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Meiryo', 'Hiragino Sans', 'Segoe UI', sans-serif;
  background:
    radial-gradient(ellipse at top, #B3E5FC 0%, transparent 60%),
    radial-gradient(ellipse at bottom, #A5D6A7 0%, transparent 60%),
    linear-gradient(180deg, #87CEEB 0%, #B6E390 55%, #81C784 100%);
  background-attachment: fixed;
  min-height: 100vh;
  padding: 20px;
  color: #333;
  position: relative;
  overflow-x: hidden;
}

/* ================================================= */
/* 背景レイヤー（ピクミンたちが遊び回る）              */
/* ================================================= */
.bg-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* 雲 */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  box-shadow:
    25px -10px 0 -5px rgba(255,255,255,0.7),
    50px 0 0 -10px rgba(255,255,255,0.7),
    -25px -5px 0 -8px rgba(255,255,255,0.7);
  animation: cloud-float linear infinite;
}

@keyframes cloud-float {
  0%   { transform: translateX(-150px); }
  100% { transform: translateX(calc(100vw + 150px)); }
}

/* 草 */
.grass-blade {
  position: absolute;
  bottom: 0;
  width: 4px;
  height: 25px;
  background: linear-gradient(180deg, #66BB6A, #2E7D32);
  border-radius: 50% 50% 0 0 / 80% 80% 0 0;
  transform-origin: bottom center;
  animation: grass-sway 3s ease-in-out infinite;
}

@keyframes grass-sway {
  0%, 100% { transform: rotate(-3deg); }
  50%      { transform: rotate(3deg); }
}

/* 花 */
.flower {
  position: absolute;
  font-size: 20px;
  animation: flower-sway 4s ease-in-out infinite;
}

@keyframes flower-sway {
  0%, 100% { transform: rotate(-8deg); }
  50%      { transform: rotate(8deg); }
}

/* 背景で動くピクミン */
.bg-pikmin {
  position: absolute;
  opacity: 0.55;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
  will-change: transform;
}

/* モバイルでは背景装飾を軽量化（影や重いエフェクトを削減） */
@media (max-width: 768px) {
  .bg-pikmin { filter: none; }
  .cloud { box-shadow:
    18px -6px 0 -5px rgba(255,255,255,0.7),
    -18px -3px 0 -8px rgba(255,255,255,0.7); }
}

/* ユーザーがモーション軽減を希望する場合はアニメーションを停止 */
@media (prefers-reduced-motion: reduce) {
  .cloud, .grass-blade, .flower, .bg-pikmin {
    animation: none !important;
  }
}

@keyframes walk-1 {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(60px, -15px); }
  50%  { transform: translate(120px, 0); }
  75%  { transform: translate(60px, 15px); }
  100% { transform: translate(0, 0); }
}

@keyframes walk-2 {
  0%   { transform: translate(0, 0) scaleX(1); }
  49%  { transform: translate(-80px, -20px) scaleX(1); }
  50%  { transform: translate(-80px, -20px) scaleX(-1); }
  99%  { transform: translate(0, 0) scaleX(-1); }
  100% { transform: translate(0, 0) scaleX(1); }
}

@keyframes walk-3 {
  0%   { transform: translate(0, 0) rotate(0); }
  33%  { transform: translate(40px, -30px) rotate(5deg); }
  66%  { transform: translate(-30px, -40px) rotate(-5deg); }
  100% { transform: translate(0, 0) rotate(0); }
}

@keyframes walk-4 {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(0, -40px); }
  100% { transform: translate(0, 0); }
}

@keyframes walk-5 {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  25%      { transform: translate(-50px, 20px) rotate(-8deg); }
  50%      { transform: translate(-100px, 0) rotate(0); }
  75%      { transform: translate(-50px, -20px) rotate(8deg); }
}

@keyframes wiggle {
  0%, 100% { transform: rotate(-5deg); }
  50%      { transform: rotate(5deg); }
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

header {
  text-align: center;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 20px;
  background: linear-gradient(135deg, #FFD54F 0%, #FF7043 50%, #EC407A 100%);
  padding: 30px 20px;
  border-radius: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

header h1 { font-size: 2.5em; margin-bottom: 8px; position: relative; }
header p { font-size: 1.1em; position: relative; opacity: 0.95; }

.progress-container, .stats, .garden, .achievements {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  backdrop-filter: blur(4px);
}

.section-title {
  color: #2d6a3e;
  margin-bottom: 15px;
  font-size: 1.4em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar {
  background: #E8EAED;
  height: 32px;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  background: linear-gradient(90deg, #FFD54F, #FF7043, #66BB6A);
  height: 100%;
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 16px;
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 0% 0; }
  100% { background-position: 200% 0; }
}

.progress-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  color: white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(115px, 1fr));
  gap: 12px;
}

.stat-card {
  padding: 15px 10px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  transition: transform 0.2s;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.stat-card:hover { transform: translateY(-4px) scale(1.03); }
.stat-card .count { font-size: 2em; display: block; line-height: 1.1; }
.stat-card .label { font-size: 0.85em; }

/* ガーデン */
.garden {
  background: linear-gradient(180deg, rgba(165, 229, 130, 0.95) 0%, rgba(123, 201, 111, 0.95) 100%);
  position: relative;
  overflow: hidden;
}

.garden .section-title {
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.garden-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-detail {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: all 0.2s;
  font-size: 0.95em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-detail:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

.pikmin-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  align-items: flex-end;
  min-height: 110px;
  max-height: 260px;
  overflow-y: auto;
  position: relative;
  z-index: 1;
  padding: 10px;
}

.pikmin-area::-webkit-scrollbar { width: 8px; }
.pikmin-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); border-radius: 4px; }
.pikmin-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.6); border-radius: 4px; }

.empty-garden {
  color: white;
  text-align: center;
  font-size: 1.1em;
  padding: 30px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  width: 100%;
}

.pikmin {
  position: relative;
  width: 38px;
  height: 58px;
  animation: bounce 2s ease-in-out infinite;
  transform-origin: bottom center;
  cursor: pointer;
  transition: transform 0.2s;
}

.pikmin:hover { transform: scale(1.3) translateY(-8px); z-index: 10; }

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

@keyframes spawn {
  0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.3) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.pikmin.new { animation: spawn 0.6s ease-out, bounce 2s ease-in-out 0.6s infinite; }

/* クリックしたときのぴょんっリアクション */
@keyframes pikmin-poke {
  0%   { transform: translateY(0) scale(1) rotate(0); }
  25%  { transform: translateY(-18px) scale(1.2) rotate(-8deg); }
  50%  { transform: translateY(0) scale(0.95) rotate(5deg); }
  75%  { transform: translateY(-6px) scale(1.05) rotate(-3deg); }
  100% { transform: translateY(0) scale(1) rotate(0); }
}
.pikmin.poked, .detail-pikmin.poked {
  animation: pikmin-poke 0.6s ease-out !important;
}

/* クリック時のキラキラエフェクト */
.poke-spark {
  position: absolute;
  pointer-events: none;
  font-size: 18px;
  animation: poke-spark 0.6s ease-out forwards;
  z-index: 100;
}
@keyframes poke-spark {
  0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
  100% { transform: translate(var(--tx, 0), var(--ty, -30px)) scale(1.2); opacity: 0; }
}

/* 実績 */
.achievements-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-add {
  background: linear-gradient(135deg, #FF7043, #FFD54F);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255, 112, 67, 0.4);
  transition: all 0.2s;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255, 112, 67, 0.5); }

.filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

.filter-btn {
  padding: 6px 16px;
  border: 2px solid #E0E0E0;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  color: #666;
  transition: all 0.2s;
}

.filter-btn.active { background: #2d6a3e; color: white; border-color: #2d6a3e; }

.achievement-card {
  background: linear-gradient(135deg, #FFFDE7, #FFF9C4);
  border: 3px solid #FFD54F;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  transition: all 0.3s;
}

.achievement-card:hover { transform: translateX(4px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
.achievement-card.completed { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); border-color: #66BB6A; }

.achievement-info { flex: 1; min-width: 0; }
.achievement-title { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 5px; word-break: break-word; }
.achievement-desc { color: #555; margin-bottom: 10px; font-size: 0.95em; word-break: break-word; }

.achievement-reward {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255, 193, 7, 0.25);
  padding: 6px 14px;
  border-radius: 15px;
  font-size: 0.95em;
  color: #6D4C00;
  font-weight: bold;
  border: 1.5px solid rgba(255, 193, 7, 0.5);
}

.achievement-actions { display: flex; gap: 8px; flex-direction: column; flex-shrink: 0; }

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  font-size: 0.9em;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-2px); }
.btn-complete { background: #66BB6A; color: white; box-shadow: 0 3px 8px rgba(102, 187, 106, 0.4); }
.btn-uncomplete { background: #FFA726; color: white; box-shadow: 0 3px 8px rgba(255, 167, 38, 0.4); }
.btn-edit { background: #42A5F5; color: white; box-shadow: 0 3px 8px rgba(66, 165, 245, 0.4); }
.btn-delete { background: #EF5350; color: white; box-shadow: 0 3px 8px rgba(239, 83, 80, 0.4); }

/* モーダル */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal.active { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.3s;
}

@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal h3 { color: #2d6a3e; margin-bottom: 20px; text-align: center; font-size: 1.5em; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  font-size: 1em;
  font-family: inherit;
  background: #FAFAFA;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: #FFD54F; background: white;
}

.form-group textarea { resize: vertical; min-height: 60px; }

.pikmin-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

.pikmin-option {
  padding: 10px 6px;
  border: 3px solid #E0E0E0;
  border-radius: 12px;
  background: #FAFAFA;
  cursor: pointer;
  text-align: center;
  font-size: 0.8em;
  font-weight: bold;
  transition: all 0.2s;
}

.pikmin-option:hover { border-color: #FFD54F; }
.pikmin-option.selected { border-color: #2d6a3e; background: #E8F5E9; transform: scale(1.05); }
.pikmin-option svg { display: block; margin: 0 auto 4px; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; }

.btn-save {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
  box-shadow: 0 4px 10px rgba(102, 187, 106, 0.4);
}

.btn-cancel {
  background: #BDBDBD;
  color: white;
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
}

/* ================================================= */
/* 詳細ビューモーダル（全画面・ピクミン大画面表示）    */
/* ================================================= */
.detail-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, #87CEEB 0%, #B6E390 55%, #4CAF50 100%);
  z-index: 2000;
  flex-direction: column;
}

.detail-modal.active { display: flex; animation: fadeIn 0.3s; }

.detail-header {
  padding: 18px 25px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  z-index: 2;
}

.detail-header h2 {
  color: #2d6a3e;
  font-size: 1.6em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-counter {
  background: linear-gradient(135deg, #FFD54F, #FF7043);
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-close-detail {
  background: #EF5350;
  color: white;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 1.3em;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(239, 83, 80, 0.4);
  transition: transform 0.2s;
}

.btn-close-detail:hover { transform: rotate(90deg) scale(1.1); }

.detail-stage {
  flex: 1;
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

.detail-ground {
  position: relative;
  min-height: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 40px;
}

.detail-pikmin {
  width: 80px;
  height: 120px;
  animation: bounce 2s ease-in-out infinite;
  transition: transform 0.2s;
  cursor: pointer;
}

.detail-pikmin:hover { transform: scale(1.2) translateY(-10px); z-index: 5; }

.detail-empty {
  color: white;
  text-align: center;
  font-size: 1.4em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  padding: 60px 20px;
  width: 100%;
}

/* ピクミンフィルター（詳細ビュー内） */
.detail-filters {
  display: flex;
  gap: 8px;
  padding: 15px 25px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  overflow-x: auto;
  white-space: nowrap;
}

.detail-filter-btn {
  padding: 6px 14px;
  border: 2px solid rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  color: #333;
  transition: all 0.2s;
  flex-shrink: 0;
}

.detail-filter-btn.active { background: #2d6a3e; color: white; border-color: #2d6a3e; }

/* トースト */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
  padding: 15px 30px;
  border-radius: 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  z-index: 2500;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-weight: bold;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.confetti {
  position: fixed;
  top: -10px;
  z-index: 1500;
  pointer-events: none;
  animation: fall 3s ease-in forwards;
}

@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

.footer { text-align: center; margin-top: 20px; padding: 15px; }

.btn-reset {
  background: rgba(255,255,255,0.8);
  color: #666;
  border: 2px solid #BDBDBD;
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

.btn-reset:hover { background: rgba(239, 83, 80, 0.1); border-color: #EF5350; color: #EF5350; }

/* カスタム確認モーダル */
.confirm-content { max-width: 420px; }
.confirm-message {
  color: #444;
  font-size: 1.05em;
  line-height: 1.6;
  text-align: center;
  margin: 10px 0 12px;
  white-space: pre-line;
}
.confirm-warning {
  background: #FFF3E0;
  border: 2px solid #FFB74D;
  color: #E65100;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.95em;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
}
.confirm-ok.danger {
  background: linear-gradient(135deg, #EF5350, #B71C1C);
}

/* キーボード操作: focus-visible スタイル */
button:focus-visible,
.pikmin-option:focus-visible,
.filter-btn:focus-visible,
[data-action]:focus-visible {
  outline: 3px solid #FFD54F;
  outline-offset: 3px;
  box-shadow: 0 0 0 5px rgba(255, 213, 79, 0.3);
}

@media (max-width: 600px) {
  header h1 { font-size: 1.8em; }
  .achievement-card { flex-direction: column; align-items: stretch; }
  .achievement-actions { flex-direction: row; justify-content: flex-end; flex-wrap: wrap; }

<body>

<!-- 実績追加/編集モーダル -->

</div>

<script>
// スマホ判定（軽量化用）

                  || 'ontouchstart' in window;

const PIKMIN_TYPES = {

let achievements = [];

function load() {
  const saved = localStorage.getItem('pikminGame_v1');
  if (saved) {
    try { achievements = JSON.parse(saved); }
    catch(e) { achievements = JSON.parse(JSON.stringify(DEFAULT_ACHIEVEMENTS)); }
  } else {
    achievements = JSON.parse(JSON.stringify(DEFAULT_ACHIEVEMENTS));
    save();
  }
  initBackground();
  render();
  renderPikminSelector();
}

function save() { localStorage.setItem('pikminGame_v1', JSON.stringify(achievements)); }

function render() {
  renderStats();
  renderGarden();
  renderAchievements();

function pikminSVG(type, size = 38) {

// 文字列を安定した整数ハッシュに変換（決定的な擬似ランダム並び替えに使用）
function hashCode(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}

function getAllEarnedPikmin() {
  const result = [];
  achievements.filter(a => a.completed).forEach(a => {
    for (let i = 0; i < a.pikminCount; i++) {
      const key = `${a.id}-${i}`;
      result.push({ type: a.pikminType, key, sortKey: hashCode(key) });
    }
  });
  return result;
}

function renderStats() {
  const stats = {};
  for (const type in PIKMIN_TYPES) stats[type] = 0;
  achievements.filter(a => a.completed).forEach(a => {
    stats[a.pikminType] = (stats[a.pikminType] || 0) + a.pikminCount;
  });

  const grid = document.getElementById('statsGrid');
  const total = Object.values(stats).reduce((a, b) => a + b, 0);
  let html = `<div class="stat-card" style="background: linear-gradient(135deg, #FFD54F, #FF7043);">
    <span class="count">${total}</span><span class="label">🌱 合計</span>
  </div>`;

  for (const type in PIKMIN_TYPES) {
    const p = PIKMIN_TYPES[type];
    html += `<div class="stat-card" style="background: linear-gradient(135deg, ${p.color}, ${p.accent});">
      <span class="count">${stats[type]}</span><span class="label">${p.emoji} ${p.name}</span>
    </div>`;
  }
  grid.innerHTML = html;
}

function renderGarden() {
  const area = document.getElementById('pikminArea');
  const pikmin = getAllEarnedPikmin();

  if (pikmin.length === 0) {
    area.innerHTML = '<div class="empty-garden">🌱 実績を達成してピクミンを集めよう！ 🌱</div>';
    return;
  }

  // 安定した擬似ランダム並び（keyのハッシュで決定的にシャッフル）
  // 毎回ランダムにしないことで「さっき見た子」を見失わない
  pikmin.sort((a, b) => a.sortKey - b.sortKey);
  area.innerHTML = pikmin.map((p, i) =>
    `<div class="pikmin" data-pikmin-key="${esc(p.key)}" style="animation-delay: ${(i % 12) * 0.1}s" title="${PIKMIN_TYPES[p.type].name}">
      ${pikminSVG(p.type)}
    </div>`
  ).join('');
}

function renderAchievements() {
  const list = document.getElementById('achievementsList');
  let filtered = achievements;
  if (currentFilter === 'active') filtered = achievements.filter(a => !a.completed);
  else if (currentFilter === 'completed') filtered = achievements.filter(a => a.completed);

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:#999;padding:30px;font-size:1.1em;">
      ${currentFilter === 'all' ? '実績がありません。＋ボタンから追加してください。' :
        currentFilter === 'active' ? '未達成の実績はありません。すばらしい！' :
        '達成済みの実績はまだありません。'}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(a => {
    const p = PIKMIN_TYPES[a.pikminType];
    return `<div class="achievement-card${a.completed ? ' completed' : ''}">
      <div class="achievement-info">
        <div class="achievement-title">${a.completed ? '✅' : '⭐'} ${esc(a.title)}</div>
        <div class="achievement-desc">${esc(a.desc || '')}</div>
        <div class="achievement-reward">${pikminSVG(a.pikminType, 22)} ${p.name} × ${a.pikminCount}匹</div>
      </div>
      <div class="achievement-actions">
        ${a.completed
          ? `<button class="btn btn-uncomplete" data-action="toggle" data-id="${esc(a.id)}">↩ 戻す</button>`
          : `<button class="btn btn-complete" data-action="toggle" data-id="${esc(a.id)}">✓ 達成！</button>`}
        <button class="btn btn-edit" data-action="edit" data-id="${esc(a.id)}">✎ 編集</button>
        <button class="btn btn-delete" data-action="delete" data-id="${esc(a.id)}">🗑 削除</button>
      </div>
    </div>`;
  }).join('');
}

function renderProgress() {
  const total = achievements.length;
  const done = achievements.filter(a => a.completed).length;
  const percent = total ? (done / total * 100) : 0;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 達成 (${percent.toFixed(0)}%)`;
}

function renderPikminSelector() {
  const sel = document.getElementById('pikminSelector');
  sel.innerHTML = Object.keys(PIKMIN_TYPES).map(type => {
    const p = PIKMIN_TYPES[type];
    return `<div class="pikmin-option${type === selectedType ? ' selected' : ''}" data-action="select-pikmin" data-type="${type}">
      ${pikminSVG(type, 28)}${p.name.replace('ピクミン', '')}
    </div>`;
  }).join('');
}

/* ============================================= */
/* 背景レイヤー描画                               */
/* ============================================= */
function initBackground() {
  const layer = document.getElementById('bgLayer');
  let html = '';

  // モバイルでは要素数を減らして軽量化
  const CLOUD_COUNT  = IS_MOBILE ? 2  : 4;
  const GRASS_COUNT  = IS_MOBILE ? 15 : 35;
  const FLOWER_COUNT = IS_MOBILE ? 4  : 8;

  // 雲
  for (let i = 0; i < CLOUD_COUNT; i++) {
    const size = 40 + Math.random() * 40;
    const top = 5 + Math.random() * 35;
    const dur = 60 + Math.random() * 40;
    const delay = -Math.random() * dur;
    html += `<div class="cloud" style="
      width: ${size}px; height: ${size * 0.5}px;
      top: ${top}%;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    "></div>`;
  }

  // 草（地面に沢山）
  for (let i = 0; i < GRASS_COUNT; i++) {
    const left = Math.random() * 100;
    const height = 15 + Math.random() * 20;
    const delay = Math.random() * 3;
    html += `<div class="grass-blade" style="
      left: ${left}%; height: ${height}px;
      animation-delay: ${delay}s;
    "></div>`;
  }

  // 花（あちこちに）
  const flowers = ['🌼', '🌸', '🌺', '🌻', '🌷'];
  for (let i = 0; i < FLOWER_COUNT; i++) {
    const left = Math.random() * 95;
    const bottom = Math.random() * 15;
    const delay = Math.random() * 4;
    html += `<div class="flower" style="
      left: ${left}%; bottom: ${bottom}%;
      animation-delay: ${delay}s;
    ">${flowers[Math.floor(Math.random() * flowers.length)]}</div>`;
  }

  layer.innerHTML = html;
}

function renderBgPikmin() {
  const layer = document.getElementById('bgLayer');
  // 既存のbg-pikminを一度削除（雲・草・花は残す）
  layer.querySelectorAll('.bg-pikmin').forEach(el => el.remove());

  const pikmin = getAllEarnedPikmin();
  if (pikmin.length === 0) return;

  // 背景に表示する数（モバイルは軽量化: 最大10匹 / PC: 最大20匹）
  const MAX_BG = IS_MOBILE ? 10 : 20;
  const max = Math.min(MAX_BG, pikmin.length);
  const sample = [];
  for (let i = 0; i < max; i++) {
    sample.push(pikmin[Math.floor(Math.random() * pikmin.length)]);
  }

  const animations = ['walk-1', 'walk-2', 'walk-3', 'walk-4', 'walk-5'];
  const frag = document.createDocumentFragment();

  sample.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'bg-pikmin';
    const anim = animations[i % animations.length];
    const dur = 8 + Math.random() * 10;
    const delay = -Math.random() * dur;
    const top = 20 + Math.random() * 70;
    const left = Math.random() * 95;
    const size = 28 + Math.random() * 20;
    // reduced-motion設定時は歩くアニメーションを無効化して省電力化
    const animCSS = IS_REDUCED_MOTION
      ? 'none'
      : `${anim} ${dur}s ease-in-out infinite, bounce 2s ease-in-out infinite`;
    div.style.cssText = `
      top: ${top}%;
      left: ${left}%;
      animation: ${animCSS};
      animation-delay: ${delay}s, ${Math.random() * 2}s;
    `;
    div.innerHTML = pikminSVG(p.type, size);
    frag.appendChild(div);
  });

  layer.appendChild(frag);
}

/* ============================================= */
/* 詳細ビューモーダル                              */
/* ============================================= */
function openDetailModal() {
  detailFilter = 'all';
  renderDetailFilters();
  renderDetailGround();
  document.getElementById('detailModal').classList.add('active');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('active');
}

function setDetailFilter(f) {
  detailFilter = f;
  renderDetailFilters();
  renderDetailGround();
}

function renderDetailFilters() {
  const pikmin = getAllEarnedPikmin();
  const counts = {};
  pikmin.forEach(p => counts[p.type] = (counts[p.type] || 0) + 1);

  const container = document.getElementById('detailFilters');
  let html = `<button class="detail-filter-btn ${detailFilter === 'all' ? 'active' : ''}" data-action="detail-filter" data-filter="all">
    🌱 すべて (${pikmin.length})
  </button>`;

  for (const type in PIKMIN_TYPES) {
    if (!counts[type]) continue;
    const p = PIKMIN_TYPES[type];
    html += `<button class="detail-filter-btn ${detailFilter === type ? 'active' : ''}" data-action="detail-filter" data-filter="${type}">
      ${p.emoji} ${p.name} (${counts[type]})
    </button>`;
  }
  container.innerHTML = html;
}

function renderDetailGround() {
  const ground = document.getElementById('detailGround');
  const counter = document.getElementById('detailCounter');

  let pikmin = getAllEarnedPikmin();
  if (detailFilter !== 'all') pikmin = pikmin.filter(p => p.type === detailFilter);
  // 詳細ビューも安定順にソート
  pikmin.sort((a, b) => a.sortKey - b.sortKey);

  counter.textContent = `${detailFilter === 'all' ? '合計' : PIKMIN_TYPES[detailFilter].name} ${pikmin.length}匹`;

  if (pikmin.length === 0) {
    ground.innerHTML = '<div class="detail-empty">🌱 まだピクミンがいません<br>実績を達成して集めよう！</div>';
    return;
  }

  ground.innerHTML = pikmin.map((p, i) =>
    `<div class="detail-pikmin" data-pikmin-key="${esc(p.key)}" style="animation-delay: ${(i % 20) * 0.08}s" title="${PIKMIN_TYPES[p.type].name}">
      ${pikminSVG(p.type, 80)}
    </div>`
  ).join('');
}

/* ============================================= */
/* 実績操作                                        */
/* ============================================= */
function selectPikminType(type) { selectedType = type; renderPikminSelector(); }

function toggle(id) {
  const a = achievements.find(x => x.id === id);
  if (!a) return;

  // 達成済み→未達成（戻す）のときは、何匹消えるかを確認
  if (a.completed) {
    const p = PIKMIN_TYPES[a.pikminType];
    customConfirm({
      title: '実績を戻しますか？',
      message: `「${a.title}」を未達成に戻します。`,
      warning: `⚠ ${p.emoji} ${p.name} ${a.pikminCount}匹 がガーデンから消えます`,
      okText: '戻す',
      danger: true,
      onOk: () => {
        a.completed = false;
        save(); render();
        showToast(`↩ ${p.name} ${a.pikminCount}匹が去りました`);
      }
    });
    return;
  }

  // 未達成→達成 のときは即実行
  a.completed = true;
  save();
  render();
  const p = PIKMIN_TYPES[a.pikminType];
  showToast(`🎉 ${p.emoji} ${p.name}を ${a.pikminCount}匹 ゲット！`);
  fireConfetti(p.color);
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '実績を編集' : '実績を追加';
  if (id) {
    const a = achievements.find(x => x.id === id);
    document.getElementById('achTitle').value = a.title;
    document.getElementById('achDesc').value = a.desc || '';
    selectedType = a.pikminType;
    document.getElementById('achCount').value = a.pikminCount;
  } else {
    document.getElementById('achTitle').value = '';
    document.getElementById('achDesc').value = '';
    selectedType = 'red';
    document.getElementById('achCount').value = 3;
  }
  renderPikminSelector();
  document.getElementById('modal').classList.add('active');
  // requestAnimationFrame 2回ネスト: モーダル描画直後に確実にフォーカス
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('achTitle').focus();
  }));
}

function closeModal() { document.getElementById('modal').classList.remove('active'); editingId = null; }

function saveAchievement() {
  const title = document.getElementById('achTitle').value.trim();
  const desc = document.getElementById('achDesc').value.trim();
  const count = Math.max(1, Math.min(50, parseInt(document.getElementById('achCount').value) || 1));

  if (!title) {
    showToast('⚠ タイトルを入力してください');
    document.getElementById('achTitle').focus();
    return;
  }

  if (editingId) {
    const a = achievements.find(x => x.id === editingId);
    a.title = title; a.desc = desc; a.pikminType = selectedType; a.pikminCount = count;
    showToast('✎ 実績を更新しました');
  } else {
    achievements.push({
      id: 'a' + Date.now(), title, desc,
      pikminType: selectedType, pikminCount: count, completed: false
    });
    showToast('✨ 新しい実績を追加しました！');
  }
  save(); render(); closeModal();
}

function edit(id) { openModal(id); }

function del(id) {
  const a = achievements.find(x => x.id === id);
  if (!a) return;
  const p = PIKMIN_TYPES[a.pikminType];
  const warning = a.completed
    ? `⚠ ${p.emoji} ${p.name} ${a.pikminCount}匹 がガーデンから消えます`
    : '';
  customConfirm({
    title: '実績を削除しますか？',
    message: `「${a.title}」を削除します。\nこの操作は元に戻せません。`,
    warning,
    okText: '削除する',
    danger: true,
    onOk: () => {
      achievements = achievements.filter(x => x.id !== id);
      save(); render();
      showToast('🗑 実績を削除しました');
    }
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderAchievements();
}

function resetAll() {
  const total = achievements.filter(a => a.completed)
    .reduce((sum, a) => sum + a.pikminCount, 0);
  customConfirm({
    title: 'すべてリセットしますか？',
    message: '実績と進捗をすべて初期状態に戻します。\nこの操作は元に戻せません。',
    warning: total > 0 ? `⚠ 現在のピクミン ${total}匹 がすべて消えます` : '',
    okText: 'リセット',
    danger: true,
    onOk: () => {
      achievements = JSON.parse(JSON.stringify(DEFAULT_ACHIEVEMENTS));
      save(); render();
      showToast('🔄 リセットしました');
    }
  });
}

/* ============================================= */
/* カスタム確認モーダル（native confirm の代替）   */
/* ============================================= */
let _confirmOnOk = null;
function customConfirm({ title, message, warning, okText = 'OK', danger = false, onOk }) {
  document.getElementById('confirmTitle').textContent = title || '確認';
  document.getElementById('confirmMessage').textContent = message || '';
  const warnEl = document.getElementById('confirmWarning');
  if (warning) {
    warnEl.textContent = warning;
    warnEl.hidden = false;
  } else {
    warnEl.hidden = true;
  }
  const okBtn = document.getElementById('confirmOkBtn');
  okBtn.textContent = okText;
  okBtn.classList.toggle('danger', !!danger);
  _confirmOnOk = onOk || null;
  document.getElementById('confirmModal').classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => okBtn.focus()));
}
function closeConfirmModal(runOk) {
  document.getElementById('confirmModal').classList.remove('active');
  const cb = _confirmOnOk;
  _confirmOnOk = null;
  if (runOk && cb) cb();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2800);
}

function fireConfetti(mainColor) {
  // モバイル/reduced-motion時は紙吹雪を減らす
  const COUNT = (IS_MOBILE || IS_REDUCED_MOTION) ? 18 : 40;
  const colors = [mainColor, '#FFD54F', '#FF7043', '#66BB6A', '#42A5F5', '#AB47BC'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < COUNT; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (10 + Math.random() * 14) + 'px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    // animationend で確実に除去（setTimeoutだと取りこぼし＆タブ非表示時に溜まる）
    c.addEventListener('animationend', () => c.remove(), { once: true });
    // フォールバック: 万一animationendが発火しない場合でも掃除
    setTimeout(() => { if (c.isConnected) c.remove(); }, 6000);
    frag.appendChild(c);
  }
  document.body.appendChild(frag);
}

/* ============================================= */
/* ピクミンクリック時のぴょん！リアクション         */
/* ============================================= */
const POKE_EMOJIS = ['✨', '💫', '🌟', '💕', '🍃', '🌱'];
function pokePikmin(el) {
  if (!el || el.classList.contains('poked')) return;
  el.classList.add('poked');
  el.addEventListener('animationend', () => el.classList.remove('poked'), { once: true });

  // キラキラエフェクト（2〜3個飛ぶ）
  const n = 2 + Math.floor(Math.random() * 2);
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'poke-spark';
    s.textContent = POKE_EMOJIS[Math.floor(Math.random() * POKE_EMOJIS.length)];
    s.style.left = (rect.left + rect.width / 2) + 'px';
    s.style.top = (rect.top + rect.height / 3) + 'px';
    s.style.setProperty('--tx', (-30 + Math.random() * 60) + 'px');
    s.style.setProperty('--ty', (-40 - Math.random() * 20) + 'px');
    s.addEventListener('animationend', () => s.remove(), { once: true });
    document.body.appendChild(s);
  }
}

/* ============================================= */
/* イベント委譲（全クリックをここで捌く）           */
/* ============================================= */
document.addEventListener('click', e => {
  // ピクミンをクリック（ぴょん！リアクション）
  const pkm = e.target.closest('.pikmin, .detail-pikmin');
  if (pkm) { pokePikmin(pkm); return; }

  // data-action を持つ要素を探す
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  const filter = el.dataset.filter;
  const type = el.dataset.type;

  switch (action) {
    // 上部ボタン類
    case 'open-detail':       openDetailModal(); break;
    case 'close-detail':      closeDetailModal(); break;
    case 'open-add':          openModal(); break;
    case 'reset-all':         resetAll(); break;

    // 実績カード
    case 'toggle':            toggle(id); break;
    case 'edit':              openModal(id); break;
    case 'delete':            del(id); break;

    // フィルター
    case 'filter':            setFilter(filter); break;
    case 'detail-filter':     setDetailFilter(filter); break;

    // 実績追加/編集モーダル
    case 'close-modal':       closeModal(); break;
    case 'save-achievement':  saveAchievement(); break;
    case 'select-pikmin':     selectPikminType(type); break;

    // カスタム確認モーダル
    case 'confirm-ok':        closeConfirmModal(true); break;
    case 'confirm-cancel':    closeConfirmModal(false); break;
  }
});

// モーダル背景クリックで閉じる
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target.id === 'confirmModal') closeConfirmModal(false);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeConfirmModal(false);
    closeModal();
    closeDetailModal();
  } else if (e.key === 'Enter' && document.getElementById('confirmModal').classList.contains('active')) {
    // 確認モーダルが開いているとき、Enterで確定
    e.preventDefault();
    closeConfirmModal(true);
  }
});

load();
</script>
</body>
</html>
