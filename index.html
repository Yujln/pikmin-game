<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 ピクミンガーデン 🌱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Meiryo', 'Hiragino Sans', 'Segoe UI', sans-serif;
  background:
    radial-gradient(ellipse at top, #B3E5FC 0%, transparent 60%),
    radial-gradient(ellipse at bottom, #A5D6A7 0%, transparent 60%),
    linear-gradient(180deg, #87CEEB 0%, #B6E390 55%, #81C784 100%);
  background-attachment: fixed;
  min-height: 100vh;
  padding: 20px;
  color: #333;
  position: relative;
  overflow-x: hidden;
}

/* ================================================= */
/* 背景レイヤー（ピクミンたちが遊び回る）              */
/* ================================================= */
.bg-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* 雲 */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  box-shadow:
    25px -10px 0 -5px rgba(255,255,255,0.7),
    50px 0 0 -10px rgba(255,255,255,0.7),
    -25px -5px 0 -8px rgba(255,255,255,0.7);
  animation: cloud-float linear infinite;
}

@keyframes cloud-float {
  0%   { transform: translateX(-150px); }
  100% { transform: translateX(calc(100vw + 150px)); }
}

/* 草 */
.grass-blade {
  position: absolute;
  bottom: 0;
  width: 4px;
  height: 25px;
  background: linear-gradient(180deg, #66BB6A, #2E7D32);
  border-radius: 50% 50% 0 0 / 80% 80% 0 0;
  transform-origin: bottom center;
  animation: grass-sway 3s ease-in-out infinite;
}

@keyframes grass-sway {
  0%, 100% { transform: rotate(-3deg); }
  50%      { transform: rotate(3deg); }
}

/* 花 */
.flower {
  position: absolute;
  font-size: 20px;
  animation: flower-sway 4s ease-in-out infinite;
}

@keyframes flower-sway {
  0%, 100% { transform: rotate(-8deg); }
  50%      { transform: rotate(8deg); }
}

/* 背景で動くピクミン */
.bg-pikmin {
  position: absolute;
  opacity: 0.55;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
  will-change: transform;
}

/* モバイルでは背景装飾を軽量化（影や重いエフェクトを削減） */
@media (max-width: 768px) {
  .bg-pikmin { filter: none; }
  .cloud { box-shadow:
    18px -6px 0 -5px rgba(255,255,255,0.7),
    -18px -3px 0 -8px rgba(255,255,255,0.7); }
}

/* ユーザーがモーション軽減を希望する場合はアニメーションを停止 */
@media (prefers-reduced-motion: reduce) {
  .cloud, .grass-blade, .flower, .bg-pikmin {
    animation: none !important;
  }
}

@keyframes walk-1 {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(60px, -15px); }
  50%  { transform: translate(120px, 0); }
  75%  { transform: translate(60px, 15px); }
  100% { transform: translate(0, 0); }
}

@keyframes walk-2 {
  0%   { transform: translate(0, 0) scaleX(1); }
  49%  { transform: translate(-80px, -20px) scaleX(1); }
  50%  { transform: translate(-80px, -20px) scaleX(-1); }
  99%  { transform: translate(0, 0) scaleX(-1); }
  100% { transform: translate(0, 0) scaleX(1); }
}

@keyframes walk-3 {
  0%   { transform: translate(0, 0) rotate(0); }
  33%  { transform: translate(40px, -30px) rotate(5deg); }
  66%  { transform: translate(-30px, -40px) rotate(-5deg); }
  100% { transform: translate(0, 0) rotate(0); }
}

@keyframes walk-4 {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(0, -40px); }
  100% { transform: translate(0, 0); }
}

@keyframes walk-5 {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  25%      { transform: translate(-50px, 20px) rotate(-8deg); }
  50%      { transform: translate(-100px, 0) rotate(0); }
  75%      { transform: translate(-50px, -20px) rotate(8deg); }
}

@keyframes wiggle {
  0%, 100% { transform: rotate(-5deg); }
  50%      { transform: rotate(5deg); }
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

header {
  text-align: center;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  margin-bottom: 20px;
  background: linear-gradient(135deg, #FFD54F 0%, #FF7043 50%, #EC407A 100%);
  padding: 30px 20px;
  border-radius: 25px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

header h1 { font-size: 2.5em; margin-bottom: 8px; position: relative; }
header p { font-size: 1.1em; position: relative; opacity: 0.95; }

.progress-container, .stats, .garden, .achievements {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  backdrop-filter: blur(4px);
}

.section-title {
  color: #2d6a3e;
  margin-bottom: 15px;
  font-size: 1.4em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar {
  background: #E8EAED;
  min-height: 36px;           /* 固定 height → min-height で自動拡大 */
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  display: flex;              /* 文字が中央に来るように flex 化 */
  align-items: center;
  justify-content: center;
  padding: 6px 14px;
  box-sizing: border-box;
}

.progress-fill {
  position: absolute;
  top: 0; left: 0; bottom: 0; /* 親の高さに追従 */
  background: linear-gradient(90deg, #FFD54F, #FF7043, #66BB6A);
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 18px;
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
  z-index: 0;
}

@keyframes shimmer {
  0% { background-position: 0% 0; }
  100% { background-position: 200% 0; }
}

.progress-text {
  position: relative;          /* absolute → relative: バーを押し広げる */
  z-index: 1;
  font-weight: bold;
  color: white;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
  text-align: center;
  line-height: 1.3;
  white-space: nowrap;         /* まず1行で入れる */
  font-size: 0.95em;
}
@media (max-width: 420px) {
  .progress-text {
    white-space: normal;       /* 画面が狭いときだけ折返し許可（はみ出すよりマシ）*/
    font-size: 0.88em;
  }
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(115px, 1fr));
  gap: 12px;
}

.stat-card {
  padding: 15px 10px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  transition: transform 0.2s;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.stat-card:hover { transform: translateY(-4px) scale(1.03); }
.stat-card .count { font-size: 2em; display: block; line-height: 1.1; }
.stat-card .label { font-size: 0.85em; }

/* ガーデン */
.garden {
  background: linear-gradient(180deg, rgba(165, 229, 130, 0.95) 0%, rgba(123, 201, 111, 0.95) 100%);
  position: relative;
  overflow: hidden;
}

.garden .section-title {
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.garden-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-detail {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: all 0.2s;
  font-size: 0.95em;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-detail:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

.pikmin-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  align-items: flex-end;
  min-height: 110px;
  max-height: 260px;
  overflow-y: auto;
  position: relative;
  z-index: 1;
  padding: 10px;
}

.pikmin-area::-webkit-scrollbar { width: 8px; }
.pikmin-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); border-radius: 4px; }
.pikmin-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.6); border-radius: 4px; }

.empty-garden {
  color: white;
  text-align: center;
  font-size: 1.1em;
  padding: 30px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  width: 100%;
}

.pikmin {
  position: relative;
  width: 38px;
  height: 58px;
  animation: bounce 2s ease-in-out infinite;
  transform-origin: bottom center;
  cursor: pointer;
  transition: transform 0.2s;
}

.pikmin:hover { transform: scale(1.3) translateY(-8px); z-index: 10; }

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

@keyframes spawn {
  0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
  60%  { transform: scale(1.3) rotate(10deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.pikmin.new { animation: spawn 0.6s ease-out, bounce 2s ease-in-out 0.6s infinite; }

/* クリックしたときのぴょんっリアクション */
@keyframes pikmin-poke {
  0%   { transform: translateY(0) scale(1) rotate(0); }
  25%  { transform: translateY(-18px) scale(1.2) rotate(-8deg); }
  50%  { transform: translateY(0) scale(0.95) rotate(5deg); }
  75%  { transform: translateY(-6px) scale(1.05) rotate(-3deg); }
  100% { transform: translateY(0) scale(1) rotate(0); }
}
.pikmin.poked, .detail-pikmin.poked {
  animation: pikmin-poke 0.6s ease-out !important;
}

/* クリック時のキラキラエフェクト */
.poke-spark {
  position: absolute;
  pointer-events: none;
  font-size: 18px;
  animation: poke-spark 0.6s ease-out forwards;
  z-index: 100;
}
@keyframes poke-spark {
  0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
  100% { transform: translate(var(--tx, 0), var(--ty, -30px)) scale(1.2); opacity: 0; }
}

/* 実績 */
.achievements-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-add {
  background: linear-gradient(135deg, #FF7043, #FFD54F);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(255, 112, 67, 0.4);
  transition: all 0.2s;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255, 112, 67, 0.5); }

.filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

.filter-btn {
  padding: 6px 16px;
  border: 2px solid #E0E0E0;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  color: #666;
  transition: all 0.2s;
}

.filter-btn.active { background: #2d6a3e; color: white; border-color: #2d6a3e; }

.achievement-card {
  background: linear-gradient(135deg, #FFFDE7, #FFF9C4);
  border: 3px solid #FFD54F;
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
  transition: all 0.3s;
}

.achievement-card:hover { transform: translateX(4px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
.achievement-card.completed { background: linear-gradient(135deg, #C8E6C9, #A5D6A7); border-color: #66BB6A; }

.achievement-info { flex: 1; min-width: 0; }
.achievement-title { font-size: 1.2em; font-weight: bold; color: #333; margin-bottom: 5px; word-break: break-word; }
.achievement-desc { color: #555; margin-bottom: 10px; font-size: 0.95em; word-break: break-word; }

.achievement-reward {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255, 193, 7, 0.25);
  padding: 6px 14px;
  border-radius: 15px;
  font-size: 0.95em;
  color: #6D4C00;
  font-weight: bold;
  border: 1.5px solid rgba(255, 193, 7, 0.5);
}

.achievement-actions { display: flex; gap: 8px; flex-direction: column; flex-shrink: 0; }

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  font-size: 0.9em;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-2px); }
.btn-complete { background: #66BB6A; color: white; box-shadow: 0 3px 8px rgba(102, 187, 106, 0.4); }
.btn-uncomplete { background: #FFA726; color: white; box-shadow: 0 3px 8px rgba(255, 167, 38, 0.4); }
.btn-edit { background: #42A5F5; color: white; box-shadow: 0 3px 8px rgba(66, 165, 245, 0.4); }
.btn-delete { background: #EF5350; color: white; box-shadow: 0 3px 8px rgba(239, 83, 80, 0.4); }

/* モーダル */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal.active { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.3s;
}

@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal h3 { color: #2d6a3e; margin-bottom: 20px; text-align: center; font-size: 1.5em; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  font-size: 1em;
  font-family: inherit;
  background: #FAFAFA;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: #FFD54F; background: white;
}

.form-group textarea { resize: vertical; min-height: 60px; }

@keyframes shake-input {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-7px); }
  40%      { transform: translateX(7px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}
.input-error {
  border-color: #EF5350 !important;
  box-shadow: 0 0 0 3px rgba(239,83,80,0.18) !important;
  animation: shake-input 0.4s ease;
}

.pikmin-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

.pikmin-option {
  padding: 10px 6px;
  border: 3px solid #E0E0E0;
  border-radius: 12px;
  background: #FAFAFA;
  cursor: pointer;
  text-align: center;
  font-size: 0.8em;
  font-weight: bold;
  transition: all 0.2s;
}

.pikmin-option:hover { border-color: #FFD54F; }
.pikmin-option.selected { border-color: #2d6a3e; background: #E8F5E9; transform: scale(1.05); }
.pikmin-option svg { display: block; margin: 0 auto 4px; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; }

.btn-save {
  background: linear-gradient(135deg, #66BB6A, #43A047);
  color: white;
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
  box-shadow: 0 4px 10px rgba(102, 187, 106, 0.4);
}

.btn-cancel {
  background: #BDBDBD;
  color: white;
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  font-size: 1em;
}

/* ================================================= */
/* 詳細ビューモーダル（全画面・ピクミン大画面表示）    */
/* ================================================= */
.detail-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, #87CEEB 0%, #B6E390 55%, #4CAF50 100%);
  z-index: 2000;
  flex-direction: column;
}

.detail-modal.active { display: flex; animation: fadeIn 0.3s; }

.detail-header {
  padding: 18px 25px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  z-index: 2;
}

.detail-header h2 {
  color: #2d6a3e;
  font-size: 1.6em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-counter {
  background: linear-gradient(135deg, #FFD54F, #FF7043);
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}

.btn-close-detail {
  background: #EF5350;
  color: white;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 1.3em;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(239, 83, 80, 0.4);
  transition: transform 0.2s;
}

.btn-close-detail:hover { transform: rotate(90deg) scale(1.1); }

.detail-stage {
  flex: 1;
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

.detail-ground {
  position: relative;
  min-height: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 40px;
}

.detail-pikmin {
  width: 80px;
  height: 120px;
  animation: bounce 2s ease-in-out infinite;
  transition: transform 0.2s;
  cursor: pointer;
}

.detail-pikmin:hover { transform: scale(1.2) translateY(-10px); z-index: 5; }

.detail-empty {
  color: white;
  text-align: center;
  font-size: 1.4em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  padding: 60px 20px;
  width: 100%;
}

/* ピクミンフィルター（詳細ビュー内） */
.detail-filters {
  display: flex;
  gap: 8px;
  padding: 15px 25px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  overflow-x: auto;
  white-space: nowrap;
}

.detail-filter-btn {
  padding: 6px 14px;
  border: 2px solid rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  color: #333;
  transition: all 0.2s;
  flex-shrink: 0;
}

.detail-filter-btn.active { background: #2d6a3e; color: white; border-color: #2d6a3e; }

/* ============================================= */
/* 詳細ビュー：餌トレイ＆D&D                      */
/* ============================================= */
.food-tray {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 20px;
  background: rgba(255,249,196,0.92);
  border-top: 2px solid rgba(255,183,77,0.5);
  border-bottom: 2px solid rgba(255,183,77,0.5);
  backdrop-filter: blur(4px);
  flex-shrink: 0;
  min-height: 56px;
}
.food-tray-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}
.food-tray-count {
  font-size: 1.05em;
  font-weight: bold;
  color: #4E342E;
}
.food-tray-hint {
  font-size: 0.78em;
  color: #8D6E63;
}
.food-tray-hint .arrow {
  display: inline-block;
  animation: hint-bounce 1.4s ease-in-out infinite;
}
@keyframes hint-bounce {
  0%, 100% { transform: translateX(0); }
  50%       { transform: translateX(6px); }
}
.food-draggable {
  font-size: 2.4em;
  line-height: 1;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;

/* ドラッグ中にピクミンが光る */
.detail-pikmin.drag-over {

}
/* 移動するゴースト要素 */
#feedGhost {

  font-size: 2.6em;
  pointer-events: none;

  will-change: transform;
}

/* トースト */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);

  color: white;
  padding: 15px 30px;
  border-radius: 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);

  font-weight: bold;
}

.confetti {
  position: fixed;
  top: -10px;
  z-index: 1500;

}

.footer { text-align: center; margin-top: 20px; padding: 15px; }

.btn-reset {

}

/* カスタム確認モーダル */

}

/* キーボード操作: focus-visible スタイル */

}

<script>
// スマホ判定（軽量化用）
const IS_MOBILE = window.matchMedia('(max-width: 768px)').matches
                  || 'ontouchstart' in window;
const IS_REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const PIKMIN_TYPES = {
  red:    { name: '赤ピクミン',   color: '#E53935', emoji: '🔴', accent: '#B71C1C' },
  blue:   { name: '青ピクミン',   color: '#1E88E5', emoji: '🔵', accent: '#0D47A1' },
  yellow: { name: '黄ピクミン',   color: '#FDD835', emoji: '🟡', accent: '#F57F17' },
  white:  { name: '白ピクミン',   color: '#F5F5F5', emoji: '⚪', accent: '#BDBDBD' },
  purple: { name: '紫ピクミン',   color: '#8E24AA', emoji: '🟣', accent: '#4A148C' },
  rock:   { name: '岩ピクミン',   color: '#37474F', emoji: '🪨', accent: '#1A1A1A' },
  winged: { name: '羽ピクミン',   color: '#EC407A', emoji: '🌸', accent: '#AD1457' },
  ice:    { name: '氷ピクミン',   color: '#80DEEA', emoji: '🧊', accent: '#00838F' }
};

const DEFAULT_ACHIEVEMENTS = [
  { id: 'd1', title: 'はじめの一歩',   desc: 'アプリを開いた',         pikminType: 'red',    foodReward: 3, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd2', title: '早起きチャレンジ', desc: '朝6時までに起きた',       pikminType: 'yellow', foodReward: 5, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd3', title: '集中勉強',       desc: '1時間集中して勉強した',   pikminType: 'blue',   foodReward: 3, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd4', title: '運動する',       desc: '30分以上運動した',        pikminType: 'purple', foodReward: 4, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd5', title: '本を読む',       desc: '本を30分読んだ',          pikminType: 'white',  foodReward: 3, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd6', title: 'お部屋キレイ',   desc: '自分の部屋を掃除した',    pikminType: 'rock',   foodReward: 2, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd7', title: '深呼吸・瞑想',   desc: '5分間瞑想した',           pikminType: 'ice',    foodReward: 2, completed: false, completedAt: null, completionLog: [], parentId: null },
  { id: 'd8', title: '新しい挑戦',     desc: '初めてのことをやってみた', pikminType: 'winged', foodReward: 5, completed: false, completedAt: null, completionLog: [], parentId: null }
];

/* ============================================= */
/* ゲームバランス定数                             */
/* ============================================= */
const DAY_MS = 24 * 60 * 60 * 1000;
const HUNGRY_AFTER_MS = 3 * DAY_MS; // 最終給餌から3日で「お腹すいた」
const WEAK_AFTER_MS   = 5 * DAY_MS; // 5日で「弱っている」
const DEAD_AFTER_MS   = 7 * DAY_MS; // 7日で死亡（削除→お墓へ）
const FEED_TO_BUD    = 1; // 餌1回でつぼみ
const FEED_TO_FLOWER = 3; // 餌3回で花咲き
// ※旧データのマイグレーション用に残す（成長段階の時間基準）
const STAGE_SPROUT_MS = 1 * DAY_MS;
const STAGE_FLOWER_MS = 3 * DAY_MS;
const DAILY_PIKMIN_CAP = 5;          // 1日に新規ピクミンとして貰える上限
const DAILY_FOOD_CAP   = 10;         // 1日に獲得できる餌の上限

/* ============================================= */
/* ゲーム状態                                     */
/* ============================================= */
let state = {
  version: 2,
  achievements: [],
  pikmin: [],            // [{ id, type, bornAt, lastFedAt, fromAchievement, diedAt }]
  resources: {
    food: 0,
    todayKey: '',        // 'YYYY-MM-DD' 今日の日付
    todayFood: 0,        // 今日獲得した餌
    todayPikmin: 0,      // 今日生まれたピクミン
  },
  settings: {
    progressPeriod: 'all',  // today|week|month|all
  },
};
let editingId = null;
let selectedType = 'red';
let currentFilter = 'all';
let detailFilter = 'all';
let activePikminId = null;  // 操作シートで選択中のピクミン

// 短縮参照
const achievements = () => state.achievements;

/* ============================================= */
/* 日付ユーティリティ                              */
/* ============================================= */
// 1日の区切り時刻（4時までは前日扱い）
const DAY_ROLLOVER_HOUR = 4;
const COMPLETION_COOLDOWN_MS = 30 * 60 * 1000; // 再達成の最短間隔：30分
const MEMORIAL_FADE_DAYS = 30; // 30日以上経った墓は薄く表示

function todayKey() {
  const d = new Date();
  if (d.getHours() < DAY_ROLLOVER_HOUR) d.setDate(d.getDate() - 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function startOfDayMs() {
  const d = new Date();
  if (d.getHours() < DAY_ROLLOVER_HOUR) d.setDate(d.getDate() - 1);
  d.setHours(DAY_ROLLOVER_HOUR, 0, 0, 0);
  return d.getTime();
}
function startOfWeekMs()  { const d = new Date(startOfDayMs()); d.setDate(d.getDate() - d.getDay()); return d.getTime(); }
function startOfMonthMs() { const d = new Date(startOfDayMs()); d.setDate(1); return d.getTime(); }

/* ============================================= */
/* 保存・ロード・マイグレーション                  */
/* ============================================= */
const STORAGE_KEY = 'pikminGame_v2';
const LEGACY_KEY  = 'pikminGame_v1';

function load() {
  var saved = null;
  var legacy = null;
  try {
    saved  = localStorage.getItem(STORAGE_KEY);
    legacy = localStorage.getItem(LEGACY_KEY);
  } catch(e) {
    // ストレージへのアクセス自体がブロックされている環境（プライベートブラウズ等）
    console.warn('localStorage読み込み失敗:', e);
    showToast('⚠ このブラウザ設定ではデータが保存されません（シークレットモード等）');
  }

  if (saved) {
    try { state = normalizeState(JSON.parse(saved)); }
    catch(e) { state = makeFreshState(); }
  } else if (legacy) {
    try { state = migrateFromV1(JSON.parse(legacy)); }
    catch(e) { state = makeFreshState(); }
    save();
  } else {
    state = makeFreshState();
    save();
  }

  rolloverDailyCapsIfNeeded();
  tick();
  initBackground();
  render();
  renderPikminSelector();
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    // シークレットモード・ストレージ制限時は進行データを失わず続行
    console.warn('localStorage保存失敗（シークレットモード等）:', e);
  }
}

function makeFreshState() {
  return {
    version: 2,
    achievements: JSON.parse(JSON.stringify(DEFAULT_ACHIEVEMENTS)),
    pikmin: [],
    resources: { food: 0, todayKey: todayKey(), todayFood: 0, todayPikmin: 0 },
    settings: { progressPeriod: 'all' },
  };
}

// v1データ（配列の achievements のみ）から v2 に移行
function migrateFromV1(v1Achievements) {
  const now = Date.now();
  const newPikmin = [];
  const newAchievements = (Array.isArray(v1Achievements) ? v1Achievements : []).map(a => {
    // 完了済みの実績はピクミンを遡って生成
    if (a.completed) {
      const count = Math.max(1, a.pikminCount || 1);
      // 生年月日を過去にランダム分散（最大7日前）＋ lastFedAt=now で不死スタート
      for (let i = 0; i < count; i++) {
        const ageAgo = Math.random() * 7 * DAY_MS;
        newPikmin.push({
          id: 'p' + (now - i) + '_' + Math.random().toString(36).slice(2, 8),
          type: a.pikminType,
          bornAt: now - ageAgo,
          lastFedAt: now,  // 移行時は全員お腹満タン
          fromAchievement: a.id,
          diedAt: null,
          feedCount: FEED_TO_FLOWER, // 移行ピクミンは花咲き状態からスタート
        });
      }
    }
    return {
      id: a.id,
      title: a.title,
      desc: a.desc || '',
      pikminType: a.pikminType,
      foodReward: Math.max(1, Math.min(10, a.pikminCount || 3)),
      completed: !!a.completed,
      completedAt: a.completed ? now : null,
    };
  });
  return {
    version: 2,
    achievements: newAchievements.length ? newAchievements : JSON.parse(JSON.stringify(DEFAULT_ACHIEVEMENTS)),
    pikmin: newPikmin,
    resources: { food: 0, todayKey: todayKey(), todayFood: 0, todayPikmin: 0 },
    settings: { progressPeriod: 'all' },
  };
}

// 既存stateの欠損フィールドを補う（バージョンアップ耐性）
function normalizeState(s) {
  const base = makeFreshState();
  const merged = { ...base, ...s };
  merged.achievements = (s.achievements || base.achievements).map(a => ({
    id: a.id,
    title: a.title || '',
    desc: a.desc || '',
    pikminType: a.pikminType || 'red',
    foodReward: Math.max(1, Math.min(10, a.foodReward || a.pikminCount || 3)),
    completed: !!a.completed,
    completedAt: a.completedAt || (a.completed ? Date.now() : null),
    // completionLog: 既存データは completedAt を種として復元（最大1件）
    completionLog: Array.isArray(a.completionLog) ? a.completionLog
      : (a.completed && a.completedAt ? [a.completedAt] : []),
    parentId: a.parentId || null,
    lastGain: (a.completed && a.lastGain && typeof a.lastGain === 'object') ? a.lastGain : null,
  }));
  merged.pikmin = (s.pikmin || []).map(p => {
    const bornAt = p.bornAt || Date.now();
    const age = Date.now() - bornAt;
    // feedCount がない旧データは、生まれてからの経過時間で推定（移行時は満タン扱い）
    let feedCount = typeof p.feedCount === 'number' ? p.feedCount
      : age >= STAGE_FLOWER_MS ? FEED_TO_FLOWER
      : age >= STAGE_SPROUT_MS ? FEED_TO_BUD
      : 0;
    return {
      id: p.id,
      type: p.type,
      bornAt,
      lastFedAt: p.lastFedAt || bornAt,
      fromAchievement: p.fromAchievement || null,
      diedAt: p.diedAt || null,
      feedCount,
    };
  });
  merged.resources = { ...base.resources, ...(s.resources || {}) };
  merged.settings  = { ...base.settings,  ...(s.settings  || {}) };
  return merged;
}

// 日付が変わっていたら今日の上限カウンタをリセット
function rolloverDailyCapsIfNeeded() {
  const tk = todayKey();
  if (state.resources.todayKey !== tk) {
    // 日付が変わった → 全リセット
    state.resources.todayKey     = tk;
    state.resources.todayFood    = 0;
    state.resources.todayPikmin  = 0;
  } else {
    // 同じ日でも todayPikmin を実際の bornAt 数から補正する
    // （旧バグで「戻す」時にデクリメントされなかったカウンタの修正）
    const startToday = startOfDayMs();
    const actualBorn = state.pikmin.filter(p => p.bornAt >= startToday).length;
    state.resources.todayPikmin  = Math.min(actualBorn, DAILY_PIKMIN_CAP);
  }
}

/* ============================================= */
/* 時間経過で状態を更新（tick）                    */
/* ============================================= */
function tick() {
  const now = Date.now();
  let changed = false;
  state.pikmin.forEach(p => {
    if (p.diedAt) return; // 既に死亡
    const since = now - p.lastFedAt;
    if (since >= DEAD_AFTER_MS) {
      p.diedAt = p.lastFedAt + DEAD_AFTER_MS;
      changed = true;
    }
  });
  if (changed) save();
}

/* ============================================= */
/* ピクミンの派生状態                              */
/* ============================================= */
function pikminState(p) {
  if (p.diedAt) return 'dead';
  const since = Date.now() - p.lastFedAt;
  if (since >= WEAK_AFTER_MS)   return 'weak';
  if (since >= HUNGRY_AFTER_MS) return 'hungry';
  return 'healthy';
}
function pikminStage(p) {
  const fc = p.feedCount || 0;
  if (fc >= FEED_TO_FLOWER) return 'flower';
  if (fc >= FEED_TO_BUD)    return 'sprout'; // 内部名は sprout、表示は「つぼみ」
  return 'seed';                             // 内部名は seed、表示は「葉っぱ」
}
function pikminHungerRatio(p) {
  const since = Date.now() - p.lastFedAt;
  return Math.max(0, Math.min(1, since / DEAD_AFTER_MS));
}
function pikminAgeDays(p) {
  const end = p.diedAt || Date.now();
  return Math.max(0, (end - p.bornAt) / DAY_MS);
}
function alivePikmin() { return state.pikmin.filter(p => !p.diedAt); }
function deadPikmin()  { return state.pikmin.filter(p => p.diedAt); }

/* ============================================= */
/* オリマー SVG（キャプテン・オリマーの顔）       */
/* ============================================= */
function olimarSVG(size) {
  size = size || 56;
  var h = Math.round(size * 76 / 60);
  return '<svg viewBox="0 0 60 76" width="' + size + '" height="' + h + '">'
    // アンテナ
    + '<line x1="33" y1="5" x2="40" y2="-4" stroke="#9E9E9E" stroke-width="2.2" stroke-linecap="round"/>'

/* パターン分析（振り返り・抵抗感検出）           */

// 過去N日間の達成回数
function recentCompletions(a, days) {
  var since = Date.now() - days * DAY_MS;
  var log = a.completionLog || [];
  var count = log.filter(function(ts) { return ts >= since; }).length;
  // completionLogがない旧データの場合: completedAtがあれば1として扱う
  if (!count && !log.length && a.completed && a.completedAt && a.completedAt >= since) {
    count = 1;
  }
  return count;
}

// 連続達成日数（最近の連続）
function consecutiveDays(a) {
  var log = (a.completionLog && a.completionLog.length)
    ? a.completionLog
    : (a.completed && a.completedAt ? [a.completedAt] : []);
  if (!log.length) return 0;

  var daySet = {};
  log.forEach(function(ts) {
    var d = new Date(ts);
    var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    daySet[key] = true;
  });

  var streak = 0;
  var d = new Date();
  d.setHours(0, 0, 0, 0);
  for (var i = 0; i < 365; i++) {
    var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if (daySet[key]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// アプリ全体で最後に達成した日のタイムスタンプ
function lastActivityTs() {
  var all = [];
  state.achievements.forEach(function(a) {
    (a.completionLog || []).forEach(function(ts) { all.push(ts); });
    if (a.completed && a.completedAt && !(a.completionLog && a.completionLog.length)) {
      all.push(a.completedAt);
    }
  });
  return all.length ? Math.max.apply(null, all) : null;
}

// 抵抗実績: 未達成 & 7日間実績なし & 最近何かしら活動している
function isResistant(a) {
  if (a.completed) return false;
  if (recentCompletions(a, 7) > 0) return false;
  var last = lastActivityTs();
  // アプリ全体で7日以内に活動がないなら「サボり全体」でフラグを立てない
  if (!last || (Date.now() - last) > 7 * DAY_MS) return false;
  return true;
}

// 最も連続達成が長い実績（2日以上のみ）
function topStreakAchievement() {
  var best = null, bestStreak = 0;
  state.achievements.forEach(function(a) {
    var s = consecutiveDays(a);
    if (s > bestStreak) { bestStreak = s; best = a; }
  });
  return (best && bestStreak >= 2) ? { achievement: best, streak: bestStreak } : null;
}

// 抵抗実績リスト（最大3件）
function resistantAchievements() {
  return state.achievements.filter(isResistant).slice(0, 3);
}

// オリマーのメッセージを決定（優先度順）
function olimarMessage() {
  var alive = alivePikmin();
  var weak = alive.filter(function(p) { return pikminState(p) === 'weak'; });
  var resistant = resistantAchievements();
  var topStreak = topStreakAchievement();

  if (weak.length > 0) {
    return weak.length + '匹が弱っているぞ！早く餌をあげてくれ！';
  }
  if (resistant.length > 0) {
    var a = resistant[0];
    return '「' + a.title + '」、しばらくやってないね。ハードルを下げてみる？';
  }
  if (topStreak) {
    return '「' + topStreak.achievement.title + '」を' + topStreak.streak + '日連続達成！その調子だ！';
  }
  if (alive.length === 0) {
    return '実績を達成してピクミンを仲間にしよう！小さな一歩から始めよう。';
  }
  var done = state.achievements.filter(function(a) { return a.completed; }).length;
  if (done === 0) {
    return '初めてのことで戸惑うのは普通だ。まずやってみることが大事だぞ！';
  }
  if (alive.length >= 10) {
    return 'ガーデンに仲間がたくさんいる！引き続き頼むぞ、研究員！';
  }
  return '今日もピクミンたちのために頑張ってくれてありがとう！一緒に頑張ろう。';
}

// 文字列を安定した整数ハッシュに変換（決定的な擬似ランダム並び替えに使用）
function hashCode(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h;
}

  if (resistant.length > 0) {
    summaryHtml += `⚠ 抵抗感あり: <strong>${resistant.map(a => '「' + esc(a.title) + '」').join(' / ')}</strong><br>`;
    summaryHtml += `<span style="font-size:0.88em;color:#555;">ハードルを一段下げた目標に切り替えてみましょう。</span>`;
  } else {
    summaryHtml += `<span style="color:#2E7D32;">全ての実績に抵抗感なし ✅</span>`;
  }
  summaryHtml += `</div>`;

  // --- ヒートマップセクション ---
  // 過去DAYS日の日付配列（新しい日 = 右）
  const dateArr = [];
  for (let i = DAYS - 1; i >= 0; i--) {
    dateArr.push(new Date(now - i * DAY_MS));
  }
  const todayD = new Date();
  const todayDKey = `${todayD.getFullYear()}-${todayD.getMonth()}-${todayD.getDate()}`;

  let heatmapHtml = `<div class="journal-section-title">📊 過去${DAYS}日の達成カレンダー</div>`;

  // 凡例
  heatmapHtml += `<div style="display:flex;gap:6px;align-items:center;font-size:0.72em;color:#999;margin-bottom:10px;">
    <div class="heatmap-cell done" style="display:inline-block"></div> 達成
    <div class="heatmap-cell" style="display:inline-block"></div> 未達成
    <div class="heatmap-cell today" style="display:inline-block"></div> 今日
  </div>`;

  state.achievements.forEach(a => {
    const log = (a.completionLog && a.completionLog.length)
      ? a.completionLog
      : (a.completed && a.completedAt ? [a.completedAt] : []);

    const daySet = {};
    log.forEach(ts => {
      const d = new Date(ts);
      daySet[`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`] = true;
    });

    const streak = consecutiveDays(a);
    const rate7 = recentCompletions(a, 7);
    const rate30 = recentCompletions(a, 30);
    const isRes = isResistant(a);

    const cells = dateArr.map(d => {
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const done = daySet[key];
      const isToday = key === todayDKey;
      const cls = done ? 'done' : '';
      const todayCls = isToday ? ' today' : '';
      return `<div class="heatmap-cell ${cls}${todayCls}" title="${d.getMonth()+1}/${d.getDate()}${done ? ' ✓' : ''}"></div>`;
    }).join('');

    heatmapHtml += `<div class="heatmap-row">
      <div class="heatmap-title">
        ${a.completed ? '✅' : '⭐'} ${esc(a.title)}
        ${isRes ? '<span class="resistant-badge">⚠ 抵抗感</span>' : ''}
        ${streak >= 2 ? `<span class="streak-badge">🔥 ${streak}日連続</span>` : ''}
      </div>
      <div class="heatmap-cells">${cells}</div>
      <div class="heatmap-stats">
        <span>今週 ${rate7}回</span>
        <span>|</span>
        <span>30日 ${rate30}回</span>
        ${isRes ? '<span class="warn">| しばらく達成なし</span>' : ''}
      </div>
    </div>`;
  });

  body.innerHTML = summaryHtml + heatmapHtml;
}

/* ステップダウン（目標ハードルを下げる）          */
/* ============================================= */
let stepdownTargetId = null;

// タイトルから「もう一段下げた」バージョンを提案
function suggestStepDown(a) {
  let title = a.title;
  const desc = a.desc || '';

  // 数字を半分にする (例: 1時間→30分, 30分→15分, 10回→5回)
  const replaced = title.replace(/(\d+)(時間|分|回|ページ|km|歩|分間)/g, (match, n, unit) => {
    const half = Math.ceil(parseInt(n) / 2);
    return half + unit;
  });
  if (replaced !== title) {
    return { title: replaced, desc };
  }

  // 数字なし → 「まず1分だけ」バリエーション
  return { title: '1分だけ' + title, desc: 'まずは1分からスタート！' };
}

function openStepDownModal(id) {
  const a = state.achievements.find(x => x.id === id);
  if (!a) return;
  stepdownTargetId = id;

  const suggestion = suggestStepDown(a);
  document.getElementById('stepdownOlimar').innerHTML = olimarSVG(62);
  document.getElementById('stepdownSpeech').textContent =
    `「${a.title}」…少し高い壁かもしれない。もう一段小さな目標から始めてみないか？`;
  document.getElementById('stepdownSuggestion').innerHTML = `
    <div class="suggest-label">🪜 オリマーの提案</div>
    <div class="suggest-title">${esc(suggestion.title)}</div>
    ${suggestion.desc ? `<div style="font-size:0.8em;color:#6a8a4f;margin-top:3px;">${esc(suggestion.desc)}</div>` : ''}`;
  document.getElementById('stepdownTitle').value = suggestion.title;
  document.getElementById('stepdownDesc').value = suggestion.desc;
  document.getElementById('stepdownModal').classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('stepdownTitle').focus();
    document.getElementById('stepdownTitle').select();
  }));
}

function closeStepDownModal() {
  document.getElementById('stepdownModal').classList.remove('active');
  stepdownTargetId = null;
}

function applyStepDown() {
  const title = document.getElementById('stepdownTitle').value.trim();
  const desc = document.getElementById('stepdownDesc').value.trim();
  if (!title) {
    showToast('⚠ タイトルを入力してください');
    document.getElementById('stepdownTitle').focus();
    return;
  }
  const parentA = state.achievements.find(x => x.id === stepdownTargetId);
  state.achievements.push({
    id: 'a' + Date.now(),
    title, desc,
    pikminType: parentA ? parentA.pikminType : 'red',
    foodReward: Math.max(1, (parentA ? parentA.foodReward : 3) - 1),
    completed: false,
    completedAt: null,
    completionLog: [],
    parentId: stepdownTargetId,
  });
  save(); render();
  closeStepDownModal();
  showToast(`🪜 「${title}」を追加しました！`);
}

function renderStats() {
  const alive = alivePikmin();

  const byType = {};
  for (const t in PIKMIN_TYPES) byType[t] = 0;
  alive.forEach(p => {
    counts[pikminState(p)]++;

  });

  // サマリー
  const summary = document.getElementById('observationSummary');
  summary.innerHTML = `
    <div class="obs-chip healthy"><span class="num">${counts.healthy}</span><span class="lbl">🌿 健康</span></div>
    <div class="obs-chip hungry"><span class="num">${counts.hungry}</span><span class="lbl">🍽️ 空腹</span></div>
    <div class="obs-chip weak"><span class="num">${counts.weak}</span><span class="lbl">💧 弱ってる</span></div>
    <div class="obs-chip memorial"><span class="num">${deadCount}</span><span class="lbl">🪦 見送り</span></div>
  `;

  // 種別カード
  const grid = document.getElementById('statsGrid');

    <span class="count">${total}</span><span class="label">🌱 合計</span>
  </div>`;
  for (const type in PIKMIN_TYPES) {
    if (!byType[type]) continue;
    const p = PIKMIN_TYPES[type];
    html += `<div class="stat-card" style="background: linear-gradient(135deg, ${p.color}, ${p.accent});">
      <span class="count">${byType[type]}</span><span class="label">${p.emoji} ${p.name}</span>

}

/* ガーデン描画（生きているピクミンのみ）          */
/* ============================================= */
function renderGarden() {
  const area = document.getElementById('pikminArea');
  const pikmin = alivePikmin().slice();

  if (pikmin.length === 0) {
    area.innerHTML = '<div class="empty-garden">🌱 実績を達成してピクミンを集めよう！ 🌱</div>';
    document.getElementById('gardenHint').className = 'garden-hint';
    return;
  }

  // 安定した擬似ランダム並び（idのハッシュで決定的にシャッフル）
  pikmin.sort((a, b) => hashCode(a.id) - hashCode(b.id));

  area.innerHTML = pikmin.map((p, i) => {
    const st = pikminState(p);
    const stg = pikminStage(p);
    const badge = st === 'weak'   ? '<span class="pikmin-status-badge">💧</span>'
                : st === 'hungry' ? '<span class="pikmin-status-badge">🍽️</span>'
                : stg === 'flower' ? '' // 花はSVG内
                : '';
    return `<div class="pikmin ${st}" data-pikmin-id="${esc(p.id)}" style="animation-delay: ${(i % 12) * 0.1}s" title="${PIKMIN_TYPES[p.type].name}・${stageLabel(stg)}・${stateLabel(st)}">
      ${pikminSVG(p.type, 38, { stage: stg, state: st })}
      ${badge}
    </div>`;
  }).join('');

  // ガーデンヒント（弱っている子がいれば表示）
  const hint = document.getElementById('gardenHint');
  const weak = pikmin.filter(p => pikminState(p) === 'weak').length;
  const hungry = pikmin.filter(p => pikminState(p) === 'hungry').length;
  if (weak > 0) {
    hint.innerHTML = `💧 <strong>${weak}匹</strong>のピクミンが弱っています。タップして餌をあげましょう！`;
    hint.className = 'garden-hint show';
  } else if (hungry > 0) {
    hint.innerHTML = `🍽️ <strong>${hungry}匹</strong>がお腹を空かせています。タップで給餌できます。`;
    hint.className = 'garden-hint show';
  } else {
    hint.className = 'garden-hint';
  }
}

function stageLabel(s) { return s === 'seed' ? '葉っぱ' : s === 'sprout' ? 'つぼみ' : '花'; }
function stateLabel(s) {
  return s === 'healthy' ? '健康' : s === 'hungry' ? 'お腹すいた' : s === 'weak' ? '弱ってる' : '天に';
}

/* 進捗バー（期間フィルタ対応）                    */
/* ============================================= */
function renderProgress() {
  const period = state.settings.progressPeriod || 'all';
  // タブのactive切替
  document.querySelectorAll('#periodTabs .period-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === period);
  });

  const src = achievements();
  let total, done;
  let label = '';
  if (period === 'all') {
    total = src.length;
    done = src.filter(a => a.completed).length;
    label = '全期間';
  } else {
    const from =
      period === 'today' ? startOfDayMs() :
      period === 'week'  ? startOfWeekMs() :
      period === 'month' ? startOfMonthMs() : 0;
    const periodAchievements = src.filter(a => a.completedAt && a.completedAt >= from);
    done = periodAchievements.length;
    // 「全体の何%」ではなく「今期間に達成した数」をシンプルに表示
    total = Math.max(done, src.filter(a => !a.completed).length + done);
    label = period === 'today' ? '今日' : period === 'week' ? '今週' : '今月';
  }
  const percent = total ? (done / total * 100) : 0;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent =
    period === 'all'
      ? `${done} / ${total} 達成 (${percent.toFixed(0)}%)`
      : `${label}: ${done}件達成`;
}

function setProgressPeriod(p) {
  state.settings.progressPeriod = p;
  save();
  renderProgress();
}

}

/* 背景レイヤー描画                               */
/* ============================================= */
function initBackground() {
  const layer = document.getElementById('bgLayer');
  let html = '';

  // モバイルでは要素数を減らして軽量化
  const CLOUD_COUNT  = IS_MOBILE ? 2  : 4;
  const GRASS_COUNT  = IS_MOBILE ? 15 : 35;
  const FLOWER_COUNT = IS_MOBILE ? 4  : 8;

  // 雲
  for (let i = 0; i < CLOUD_COUNT; i++) {
    const size = 40 + Math.random() * 40;
    const top = 5 + Math.random() * 35;
    const dur = 60 + Math.random() * 40;
    const delay = -Math.random() * dur;
    html += `<div class="cloud" style="
      width: ${size}px; height: ${size * 0.5}px;
      top: ${top}%;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    "></div>`;
  }

  // 草（地面に沢山）
  for (let i = 0; i < GRASS_COUNT; i++) {
    const left = Math.random() * 100;
    const height = 15 + Math.random() * 20;
    const delay = Math.random() * 3;
    html += `<div class="grass-blade" style="
      left: ${left}%; height: ${height}px;
      animation-delay: ${delay}s;
    "></div>`;
  }

  // 花（あちこちに）
  const flowers = ['🌼', '🌸', '🌺', '🌻', '🌷'];
  for (let i = 0; i < FLOWER_COUNT; i++) {
    const left = Math.random() * 95;
    const bottom = Math.random() * 15;
    const delay = Math.random() * 4;
    html += `<div class="flower" style="
      left: ${left}%; bottom: ${bottom}%;
      animation-delay: ${delay}s;
    ">${flowers[Math.floor(Math.random() * flowers.length)]}</div>`;
  }

  layer.innerHTML = html;
}

function renderBgPikmin() {
  const layer = document.getElementById('bgLayer');
  // 既存のbg-pikminを一度削除（雲・草・花は残す）
  layer.querySelectorAll('.bg-pikmin').forEach(el => el.remove());

  const pikmin = alivePikmin();
  if (pikmin.length === 0) return;

  // 背景に表示する数（モバイルは軽量化: 最大10匹 / PC: 最大20匹）
  const MAX_BG = IS_MOBILE ? 10 : 20;
  const max = Math.min(MAX_BG, pikmin.length);
  const sample = [];
  for (let i = 0; i < max; i++) {
    sample.push(pikmin[Math.floor(Math.random() * pikmin.length)]);
  }

  const animations = ['walk-1', 'walk-2', 'walk-3', 'walk-4', 'walk-5'];
  const frag = document.createDocumentFragment();

  sample.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'bg-pikmin';
    const anim = animations[i % animations.length];
    const dur = 8 + Math.random() * 10;
    const delay = -Math.random() * dur;
    const top = 20 + Math.random() * 70;
    const left = Math.random() * 95;
    const size = 28 + Math.random() * 20;
    // reduced-motion設定時は歩くアニメーションを無効化して省電力化
    const animCSS = IS_REDUCED_MOTION
      ? 'none'
      : `${anim} ${dur}s ease-in-out infinite, bounce 2s ease-in-out infinite`;
    div.style.cssText = `
      top: ${top}%;
      left: ${left}%;
      animation: ${animCSS};
      animation-delay: ${delay}s, ${Math.random() * 2}s;
    `;
    div.innerHTML = pikminSVG(p.type, size);
    frag.appendChild(div);
  });

  layer.appendChild(frag);
}

function renderDetailFoodTray() {
  var food = state.resources.food;
  var countEl = document.getElementById('detailFoodCount');
  var drag = document.getElementById('detailFoodDraggable');
  if (!countEl || !drag) return;
  countEl.textContent = '🍎 ' + food + '個';

    drag.classList.add('empty');
    drag.setAttribute('draggable', 'false');
  } else {
    drag.classList.remove('empty');

  }

function initDetailDragDrop() {
  var draggable = document.getElementById('detailFoodDraggable');
  var ground = document.getElementById('detailGround');
  if (!draggable || !ground) return;

  /* ---- Desktop: HTML5 Drag API ---- */
  draggable.addEventListener('dragstart', function(e) {
    if (state.resources.food <= 0) { e.preventDefault(); return; }
    e.dataTransfer.effectAllowed = 'copy';
    ground.classList.add('dragging-food');
  });

  draggable.addEventListener('dragend', function() {
    ground.classList.remove('dragging-food');
    ground.querySelectorAll('.detail-pikmin.drag-over').forEach(function(el) {
      el.classList.remove('drag-over');
    });
  });

  ground.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    var target = e.target.closest('.detail-pikmin');
    ground.querySelectorAll('.detail-pikmin.drag-over').forEach(function(el) {
      if (el !== target) el.classList.remove('drag-over');
    });
    if (target) target.classList.add('drag-over');
  });

  ground.addEventListener('dragleave', function(e) {
    var target = e.target.closest('.detail-pikmin');
    if (target && !target.contains(e.relatedTarget)) {
      target.classList.remove('drag-over');
    }
  });

  ground.addEventListener('drop', function(e) {
    e.preventDefault();
    ground.classList.remove('dragging-food');
    var target = e.target.closest('.detail-pikmin');
    ground.querySelectorAll('.detail-pikmin.drag-over').forEach(function(el) {
      el.classList.remove('drag-over');
    });
    if (target) {
      var id = target.getAttribute('data-pikmin-id');
      if (id) feedPikmin(id);
    }
  });

  /* ---- Mobile: Touch Events ---- */
  var touchGhost = null;

  draggable.addEventListener('touchstart', function(e) {
    if (state.resources.food <= 0) return;
    e.preventDefault();
    var touch = e.touches[0];
    touchGhost = document.createElement('div');
    touchGhost.id = 'feedGhost';
    touchGhost.textContent = '🍎';
    touchGhost.style.left = (touch.clientX - 24) + 'px';
    touchGhost.style.top  = (touch.clientY - 32) + 'px';
    document.body.appendChild(touchGhost);
    ground.classList.add('dragging-food');
  }, { passive: false });

  draggable.addEventListener('touchmove', function(e) {
    if (!touchGhost) return;
    e.preventDefault();
    var touch = e.touches[0];
    touchGhost.style.left = (touch.clientX - 24) + 'px';
    touchGhost.style.top  = (touch.clientY - 32) + 'px';
    touchGhost.style.display = 'none';
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchGhost.style.display = '';
    var target = el ? el.closest('.detail-pikmin') : null;
    ground.querySelectorAll('.detail-pikmin.drag-over').forEach(function(p) {
      if (p !== target) p.classList.remove('drag-over');
    });
    if (target) target.classList.add('drag-over');
  }, { passive: false });

  draggable.addEventListener('touchend', function(e) {
    e.preventDefault();
    ground.classList.remove('dragging-food');
    var over = ground.querySelector('.detail-pikmin.drag-over');
    if (over) {
      over.classList.remove('drag-over');
      var id = over.getAttribute('data-pikmin-id');
      if (id) feedPikmin(id);
    }
    if (touchGhost) {
      document.body.removeChild(touchGhost);
      touchGhost = null;
    }
  }, { passive: false });

  draggable.addEventListener('touchcancel', function() {
    ground.classList.remove('dragging-food');
    ground.querySelectorAll('.detail-pikmin.drag-over').forEach(function(p) {
      p.classList.remove('drag-over');
    });
    if (touchGhost) {
      document.body.removeChild(touchGhost);
      touchGhost = null;
    }
  });
}

function renderDetailFilters() {
  const pikmin = alivePikmin();
  const counts = {};
  pikmin.forEach(p => counts[p.type] = (counts[p.type] || 0) + 1);

  const container = document.getElementById('detailFilters');
  let html = `<button class="detail-filter-btn ${detailFilter === 'all' ? 'active' : ''}" data-action="detail-filter" data-filter="all">
    🌱 すべて (${pikmin.length})
  </button>`;

  for (const type in PIKMIN_TYPES) {
    if (!counts[type]) continue;
    const p = PIKMIN_TYPES[type];

function renderDetailGround() {
  const ground = document.getElementById('detailGround');
  const counter = document.getElementById('detailCounter');

  let pikmin = alivePikmin().slice();
  if (detailFilter !== 'all') pikmin = pikmin.filter(p => p.type === detailFilter);
  // 詳細ビューも安定順にソート（id のハッシュで決定的）
  pikmin.sort((a, b) => hashCode(a.id) - hashCode(b.id));

  counter.textContent = `${detailFilter === 'all' ? '合計' : PIKMIN_TYPES[detailFilter].name} ${pikmin.length}匹`;

  if (pikmin.length === 0) {
    ground.innerHTML = '<div class="detail-empty">🌱 まだピクミンがいません<br>実績を達成して集めよう！</div>';
    return;
  }

  ground.innerHTML = pikmin.map((p, i) => {
    const stg = pikminStage(p);
    const st  = pikminState(p);
    return `<div class="detail-pikmin ${st}" data-pikmin-id="${esc(p.id)}" style="animation-delay: ${(i % 20) * 0.08}s" title="${PIKMIN_TYPES[p.type].name}・${stageLabel(stg)}">
      ${pikminSVG(p.type, 80, { stage: stg, state: st })}

  }).join('');
}

/* ピクミン個別操作（餌・なでる・操作シート）      */

function openActionSheet(id) {
  const p = state.pikmin.find(x => x.id === id);
  if (!p || p.diedAt) return;
  activePikminId = id;
  refreshActionSheet(id);
  document.getElementById('actionSheet').classList.add('active');
}

function closeActionSheet() {
  document.getElementById('actionSheet').classList.remove('active');
  activePikminId = null;
}

function refreshActionSheet(id) {
  const p = state.pikmin.find(x => x.id === id);
  if (!p) { closeActionSheet(); return; }
  const pt = PIKMIN_TYPES[p.type];
  const stg = pikminStage(p);
  const st  = pikminState(p);

  document.getElementById('actionPikminSvg').innerHTML = pikminSVG(p.type, 72, { stage: stg, state: st });
  document.getElementById('actionPikminName').textContent = `${pt.emoji} ${pt.name}`;
  document.getElementById('actionPikminMeta').textContent =
    `${stageLabel(stg)} ・ ${stateLabel(st)} ・ ${Math.floor(pikminAgeDays(p))}日目`;

  // 成長進捗
  const fc = p.feedCount || 0;
  let growthHint = '';
  let growthPct = 0;
  if (stg === 'seed') {
    const need = FEED_TO_BUD - fc;
    growthHint = `🌿→🌼 あと${need}回でつぼみ`;
    growthPct = Math.round((fc / FEED_TO_BUD) * 100);
  } else if (stg === 'sprout') {
    const need = FEED_TO_FLOWER - fc;
    growthHint = `🌼→🌸 あと${need}回で花咲き！`;
    growthPct = Math.round(((fc - FEED_TO_BUD) / (FEED_TO_FLOWER - FEED_TO_BUD)) * 100);
  } else {
    growthHint = `🌸 満開！`;
    growthPct = 100;
  }

  // お腹バー（0=空腹極限、100=満腹）
  const hungerPercent = Math.round((1 - pikminHungerRatio(p)) * 100);
  const cls = hungerPercent >= 60 ? 'full' : hungerPercent >= 30 ? 'hungry' : 'starving';
  document.getElementById('actionPikminBars').innerHTML = `
    <div class="bar-row">
      <span class="label">お腹</span>
      <div class="bar-bg"><div class="bar-fg ${cls}" style="width:${hungerPercent}%"></div></div>
      <span>${hungerPercent}%</span>
    </div>
    <div class="bar-row">
      <span class="label">成長</span>
      <div class="bar-bg"><div class="bar-fg full" style="width:${growthPct}%;background:linear-gradient(90deg,#AED581,#FDD835)"></div></div>
      <span style="font-size:0.85em;color:#555;">${growthHint}</span>
    </div>`;

  document.getElementById('actionFoodCount').textContent = state.resources.food;
  const feedBtn = document.getElementById('actionFeedBtn');
  feedBtn.disabled = state.resources.food <= 0;
}

function feedPikmin(id) {
  const p = state.pikmin.find(x => x.id === id);
  if (!p || p.diedAt) return;
  if (state.resources.food <= 0) {
    showToast('🍎 餌が足りません。実績を達成しよう！');
    return;
  }

  const stageBefore = pikminStage(p);
  state.resources.food--;
  p.lastFedAt = Date.now();
  if (typeof p.feedCount !== 'number') p.feedCount = 0;
  p.feedCount++;
  const stageAfter = pikminStage(p);

  save();
  render();
  if (activePikminId === id) refreshActionSheet(id);
  if (document.getElementById('detailModal').classList.contains('active')) {
    renderDetailFoodTray();
    renderDetailGround();
  }

  // 成長段階が上がったときは特別なトースト
  if (stageBefore !== stageAfter) {
    const pt = PIKMIN_TYPES[p.type];
    if (stageAfter === 'sprout') {
      showToast(`🌼 ${pt.name}がつぼみになった！`);
      fireConfetti(pt.color);
    } else if (stageAfter === 'flower') {
      showToast(`🌸 ${pt.name}に花が咲いた！！`);
      fireConfetti(pt.color);
    }
  } else {
    showToast(`🍎 ${PIKMIN_TYPES[p.type].name}はお腹いっぱい！`);
  }
}

function petPikmin(id) {
  const p = state.pikmin.find(x => x.id === id);
  if (!p || p.diedAt) return;
  // 1時間分だけお腹を満たす（餌は消費しない優しい撫で）
  p.lastFedAt = Math.min(Date.now(), p.lastFedAt + 60 * 60 * 1000);
  save();
  render();
  // ガーデン側のピクミン要素にぴょんアニメを走らせる
  const el = document.querySelector(`.pikmin[data-pikmin-id="${CSS.escape(id)}"]`);
  if (el) pokePikmin(el);
  if (activePikminId === id) refreshActionSheet(id);
  showToast('🤚 なでなでした');
}

/* 実績操作                                        */
/* ============================================= */
function selectPikminType(type) { selectedType = type; renderPikminSelector(); }

function toggle(id) {
  const a = state.achievements.find(x => x.id === id);
  if (!a) return;

  // 達成済み→未達成（戻す）
  if (a.completed) {
    const p = PIKMIN_TYPES[a.pikminType];
    const linked = state.pikmin.filter(x => x.fromAchievement === id && !x.diedAt);
    customConfirm({
      title: '実績を戻しますか？',
      message: `「${a.title}」を未達成に戻します。`,
      warning: linked.length
        ? `⚠ この実績でうまれた ${p.emoji} ${p.name} ${linked.length}匹 がガーデンから去り、獲得した餌も返却されます`
        : '獲得した餌は返却されます。',
      okText: '戻す',
      danger: true,
      onOk: () => {
        // 獲得した餌・今日の上限カウンタも返却（farming バグ修正）
        const r = state.resources;
        const g = a.lastGain;
        if (g) {
          // 新フォーマット：正確に返却
          const totalFood = (g.food || 0) + (g.bonus || 0);
          r.food      = Math.max(0, r.food      - totalFood);
          r.todayFood = Math.max(0, r.todayFood - totalFood);
          if (g.born) r.todayPikmin = Math.max(0, r.todayPikmin - 1);
        } else {
          // レガシーデータ（lastGain 未記録）は foodReward を上限に最善努力で返却
          const legacy = Math.min(r.food, Math.max(1, a.foodReward || 3));
          r.food      = Math.max(0, r.food      - legacy);
          r.todayFood = Math.max(0, r.todayFood - legacy);
          // 生きているピクミンが紐付いていれば todayPikmin を1減らす
          if (state.pikmin.some(x => x.fromAchievement === id && !x.diedAt)) {
            r.todayPikmin = Math.max(0, r.todayPikmin - 1);
          }
        }
        // 紐付く生きピクミンは消える（死亡履歴は残す）
        state.pikmin = state.pikmin.filter(x => !(x.fromAchievement === id && !x.diedAt));
        a.completed = false;
        a.completedAt = null;
        a.lastGain = null;
        // completionLog の最後の1件を取り消す
        if (a.completionLog && a.completionLog.length > 0) a.completionLog.pop();
        save(); render();
        showToast('↩ 実績を戻しました（獲得した餌も返却）');
      }
    });
    return;
  }

  // 未達成→達成
  rolloverDailyCapsIfNeeded();

  // クールダウン：30分以内の再達成は無効（ヒートマップ汚染防止）
  const log = a.completionLog || [];
  const lastDone = log.length > 0 ? log[log.length - 1] : 0;
  if (lastDone && Date.now() - lastDone < COMPLETION_COOLDOWN_MS) {
    const mins = Math.ceil((COMPLETION_COOLDOWN_MS - (Date.now() - lastDone)) / 60000);
    showToast('⏳ さっき達成したばかり（あと' + mins + '分で再挑戦可能）');
    return;
  }

  const r = state.resources;
  const reward = Math.max(1, a.foodReward || 3);
  const foodRoom = Math.max(0, DAILY_FOOD_CAP - r.todayFood);
  const foodGained = Math.min(reward, foodRoom);

  let bornOne = false;
  let bonusFood = 0;
  let bornPikminId = null;
  if (r.todayPikmin < DAILY_PIKMIN_CAP) {
    // 新規ピクミンが仲間に
    bornPikminId = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    state.pikmin.push({
      id: bornPikminId,
      type: a.pikminType,
      bornAt: Date.now(),
      lastFedAt: Date.now(),
      fromAchievement: a.id,
      diedAt: null,
      feedCount: 0,
    });
    r.todayPikmin++;
    bornOne = true;
  } else {
    // 今日のピクミン上限到達 → 代わりに餌ボーナス +3（今日の餌上限内）
    bonusFood = Math.max(0, Math.min(3, DAILY_FOOD_CAP - r.todayFood - foodGained));
    r.food += bonusFood;
    r.todayFood += bonusFood;
  }
  r.food += foodGained;
  r.todayFood += foodGained;

  a.completed = true;
  a.completedAt = Date.now();
  // 獲得内訳を記録（「戻す」で正確に返却できるように）
  a.lastGain = { food: foodGained, bonus: bonusFood, born: bornOne, pikminId: bornPikminId };
  // completionLog に達成タイムスタンプを記録
  if (!a.completionLog) a.completionLog = [];
  a.completionLog.push(Date.now());
  save();
  render();

  const p = PIKMIN_TYPES[a.pikminType];
  const parts = [];
  if (bornOne) parts.push(`🎉 ${p.emoji}${p.name}誕生`);
  else parts.push('📦 今日のピクミン上限到達');
  if (foodGained > 0) parts.push(`🍎+${foodGained}`);
  else if (foodRoom === 0) parts.push('（餌上限到達）');
  showToast(parts.join(' '));
  fireConfetti(p.color);
}

    selectedType = a.pikminType;
    document.getElementById('achCount').value = a.foodReward || 3;
  } else {
    document.getElementById('achTitle').value = '';
    document.getElementById('achDesc').value = '';
    selectedType = 'red';
    document.getElementById('achCount').value = 3;
  }
  renderPikminSelector();
  document.getElementById('modal').classList.add('active');
  // requestAnimationFrame 2回ネスト: モーダル描画直後に確実にフォーカス
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('achTitle').focus();
  }));

function closeModal() { document.getElementById('modal').classList.remove('active'); editingId = null; }

function saveAchievement() {
  const title = document.getElementById('achTitle').value.trim();
  const desc = document.getElementById('achDesc').value.trim();
  const foodReward = Math.max(1, Math.min(10, parseInt(document.getElementById('achCount').value) || 1));

  if (!title) {
    var titleEl = document.getElementById('achTitle');
    titleEl.classList.remove('input-error');
    void titleEl.offsetWidth; // reflow でアニメをリセット
    titleEl.classList.add('input-error');
    titleEl.focus();
    showToast('⚠ タイトルを入力してください');
    setTimeout(function() { titleEl.classList.remove('input-error'); }, 900);
    return;
  }

  if (editingId) {
    const a = state.achievements.find(x => x.id === editingId);
    a.title = title; a.desc = desc; a.pikminType = selectedType; a.foodReward = foodReward;
    showToast('✎ 実績を更新しました');
  } else {
    state.achievements.push({
      id: 'a' + Date.now(),
      title, desc,
      pikminType: selectedType,
      foodReward,
      completed: false,
      completedAt: null,
      completionLog: [],
      parentId: null,
    });
    showToast('✨ 新しい実績を追加しました！');
  }
  save(); render(); closeModal();
}

function exportData() {
  try {
    const payload = { __pikminGardenExport: true, version: 2, exportedAt: Date.now(), data: state };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pikmin-garden-' + todayKey() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 500);
    showToast('💾 エクスポートしました');
  } catch(e) {
    console.warn('export失敗:', e);
    showToast('⚠ エクスポートに失敗しました');
  }
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.style.display = 'none';
  input.onchange = function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      let parsed;
      try {
        parsed = JSON.parse(ev.target.result);
      } catch(err) {
        showToast('⚠ ファイル形式が不正です');
        return;
      }
      // ラッパー形式（__pikminGardenExport）と生の state 両方に対応
      const candidate = (parsed && parsed.__pikminGardenExport && parsed.data) ? parsed.data : parsed;
      if (!candidate || typeof candidate !== 'object' || !Array.isArray(candidate.achievements)) {
        showToast('⚠ ピクミンガーデンのデータではありません');
        return;
      }
      customConfirm({
        title: 'インポートしますか？',
        message: '現在のデータは上書きされます。',
        warning: '事前に「エクスポート」しておくと安心です。',
        okText: 'インポート',
        danger: true,
        onOk: () => {
          try {
            state = normalizeState(candidate);
            save(); render();
            showToast('📥 インポートしました');
          } catch(err) {
            showToast('⚠ インポート処理に失敗しました');
          }
        }
      });
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(() => input.remove(), 1000);
}

function resetAll() {
  const aliveCount = alivePikmin().length;
  const food = state.resources.food;
  const warning = (aliveCount > 0 || food > 0)
    ? `⚠ 現在のピクミン ${aliveCount}匹 と餌 ${food}個 がすべて消えます`
    : '';
  customConfirm({
    title: 'すべてリセットしますか？',
    message: '実績・ピクミン・餌・進捗をすべて初期状態に戻します。\nこの操作は元に戻せません。',
    warning,
    okText: 'リセット',
    danger: true,
    onOk: () => {
      state = makeFreshState();
      save(); render();
      showToast('🔄 リセットしました');
    }
  });
}

/* ============================================= */
/* カスタム確認モーダル（native confirm の代替）   */
/* ============================================= */
let _confirmOnOk = null;
function customConfirm({ title, message, warning, okText = 'OK', danger = false, onOk }) {
  document.getElementById('confirmTitle').textContent = title || '確認';
  document.getElementById('confirmMessage').textContent = message || '';
  const warnEl = document.getElementById('confirmWarning');
  if (warning) {
    warnEl.textContent = warning;
    warnEl.hidden = false;
  } else {
    warnEl.hidden = true;
  }
  const okBtn = document.getElementById('confirmOkBtn');
  okBtn.textContent = okText;
  okBtn.classList.toggle('danger', !!danger);
  _confirmOnOk = onOk || null;
  document.getElementById('confirmModal').classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => okBtn.focus()));
}
function closeConfirmModal(runOk) {
  document.getElementById('confirmModal').classList.remove('active');
  const cb = _confirmOnOk;
  _confirmOnOk = null;
  if (runOk && cb) cb();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2800);
}

function fireConfetti(mainColor) {
  // モバイル/reduced-motion時は紙吹雪を減らす
  const COUNT = (IS_MOBILE || IS_REDUCED_MOTION) ? 18 : 40;
  const colors = [mainColor, '#FFD54F', '#FF7043', '#66BB6A', '#42A5F5', '#AB47BC'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < COUNT; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (10 + Math.random() * 14) + 'px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    // animationend で確実に除去（setTimeoutだと取りこぼし＆タブ非表示時に溜まる）
    c.addEventListener('animationend', () => c.remove(), { once: true });
    // フォールバック: 万一animationendが発火しない場合でも掃除
    setTimeout(() => { if (c.isConnected) c.remove(); }, 6000);
    frag.appendChild(c);
  }
  document.body.appendChild(frag);
}

/* ============================================= */
/* ピクミンクリック時のぴょん！リアクション         */
/* ============================================= */
const POKE_EMOJIS = ['✨', '💫', '🌟', '💕', '🍃', '🌱'];
function pokePikmin(el) {
  if (!el || el.classList.contains('poked')) return;
  el.classList.add('poked');
  el.addEventListener('animationend', () => el.classList.remove('poked'), { once: true });

  // キラキラエフェクト（2〜3個飛ぶ）
  const n = 2 + Math.floor(Math.random() * 2);
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'poke-spark';
    s.textContent = POKE_EMOJIS[Math.floor(Math.random() * POKE_EMOJIS.length)];
    s.style.left = (rect.left + rect.width / 2) + 'px';
    s.style.top = (rect.top + rect.height / 3) + 'px';
    s.style.setProperty('--tx', (-30 + Math.random() * 60) + 'px');
    s.style.setProperty('--ty', (-40 - Math.random() * 20) + 'px');
    s.addEventListener('animationend', () => s.remove(), { once: true });
    document.body.appendChild(s);
  }
}

/* ============================================= */
/* イベント委譲（全クリックをここで捌く）           */
/* ============================================= */
document.addEventListener('click', e => {
  // ガーデンのピクミンをタップ → 操作シートを開く（ぴょん！リアクション付き）
  const gardenPkm = e.target.closest('.pikmin');
  if (gardenPkm) {
    pokePikmin(gardenPkm);
    const pid = gardenPkm.dataset.pikminId;
    if (pid) openActionSheet(pid);
    return;
  }
  // 詳細ビューのピクミンは単なるリアクションのみ
  const detailPkm = e.target.closest('.detail-pikmin');
  if (detailPkm) { pokePikmin(detailPkm); return; }

  // data-action を持つ要素を探す
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  const filter = el.dataset.filter;
  const type = el.dataset.type;
  const period = el.dataset.period;

  switch (action) {
    // 上部ボタン類
    case 'open-detail':       openDetailModal(); break;
    case 'close-detail':      closeDetailModal(); break;
    case 'open-add':          openModal(); break;
    case 'reset-all':         resetAll(); break;
    case 'export-data':       exportData(); break;
    case 'import-data':       importData(); break;
    case 'bury-pikmin':       if (id) buryPikmin(id); break;
    case 'bury-all':          buryAllDead(); break;

    // 実績カード
    case 'toggle':            toggle(id); break;
    case 'edit':              openModal(id); break;
    case 'delete':            del(id); break;

    // フィルター
    case 'filter':            setFilter(filter); break;
    case 'detail-filter':     setDetailFilter(filter); break;
    case 'period':            setProgressPeriod(period); break;

    // 実績追加/編集モーダル
    case 'close-modal':       closeModal(); break;
    case 'save-achievement':  saveAchievement(); break;
    case 'select-pikmin':     selectPikminType(type); break;

    // ピクミン操作シート
    case 'feed-pikmin':       if (activePikminId) feedPikmin(activePikminId); break;
    case 'pet-pikmin':        if (activePikminId) petPikmin(activePikminId); break;
    case 'close-action-sheet':closeActionSheet(); break;

    // オリマー振り返りジャーナル
    case 'open-journal':      openJournalModal(); break;
    case 'close-journal':     closeJournalModal(); break;

    // ステップダウン
    case 'stepdown':          openStepDownModal(id); break;
    case 'close-stepdown':    closeStepDownModal(); break;
    case 'apply-stepdown':    applyStepDown(); break;

    // カスタム確認モーダル
    case 'confirm-ok':        closeConfirmModal(true); break;
    case 'confirm-cancel':    closeConfirmModal(false); break;
  }
});

// モーダル背景クリックで閉じる
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target.id === 'confirmModal') closeConfirmModal(false);
});
document.getElementById('actionSheet').addEventListener('click', e => {
  if (e.target.id === 'actionSheet') closeActionSheet();
});
document.getElementById('journalModal').addEventListener('click', e => {
  if (e.target.id === 'journalModal') closeJournalModal();
});
document.getElementById('stepdownModal').addEventListener('click', e => {
  if (e.target.id === 'stepdownModal') closeStepDownModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeConfirmModal(false);
    closeModal();
    closeDetailModal();
    closeActionSheet();
    closeJournalModal();
    closeStepDownModal();
  } else if (e.key === 'Enter' && document.getElementById('confirmModal').classList.contains('active')) {
    // 確認モーダルが開いているとき、Enterで確定
    e.preventDefault();
    closeConfirmModal(true);
  }
});

// 別タブでの変更を検知して自動反映（データ消失防止）
window.addEventListener('storage', function(e) {
  if (e.key === STORAGE_KEY && e.newValue) {
    try {
      const newState = normalizeState(JSON.parse(e.newValue));
      state = newState;
      render();
      if (activePikminId) refreshActionSheet(activePikminId);
      showToast('🔄 別タブの変更を取り込みました');
    } catch(err) {
      console.warn('storage同期失敗:', err);
    }
  }
});

// タブが再表示されたときに状態を再計算（バックグラウンド復帰で空腹・死亡を反映）
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    rolloverDailyCapsIfNeeded();
    tick();
    render();
    if (activePikminId) refreshActionSheet(activePikminId);
  }
});

load();
initDetailDragDrop();
</script>
</body>
</html>
